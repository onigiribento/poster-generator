<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 ポスタージェネレーター</title>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GV48825354"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-GV48825354');
</script>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Dela+Gothic+One&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans JP',sans-serif; background:#f4f5f9; color:#1a1a2e; min-height:100vh; }

.app-header { padding:24px 32px; display:flex; align-items:center; gap:12px; border-bottom:1px solid rgba(0,0,0,0.07); background:#fff; }
.app-header h1 { font-family:'M PLUS 1p',sans-serif; font-size:22px; font-weight:900; background:linear-gradient(90deg,#ff6b9d,#ff9a3c,#6bcbff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

.main-layout { display:grid; grid-template-columns:380px 1fr; height:calc(100vh - 73px); }

.left-panel { background:#fff; border-right:1px solid rgba(0,0,0,0.07); overflow-y:auto; padding:24px; }
.section-title { font-size:11px; font-weight:700; letter-spacing:0.15em; color:#ff6b9d; text-transform:uppercase; margin-bottom:12px; margin-top:24px; }
.section-title:first-child { margin-top:0; }
label { display:block; font-size:13px; color:#555; margin-bottom:6px; margin-top:14px; }
input[type="text"], textarea, select { width:100%; background:#f8f9fc; border:1px solid rgba(0,0,0,0.10); border-radius:8px; color:#1a1a2e; font-family:'Noto Sans JP',sans-serif; font-size:13px; padding:10px 12px; outline:none; transition:border-color 0.2s; }
input[type="text"]:focus, textarea:focus, select:focus { border-color:#ff6b9d; box-shadow:0 0 0 3px rgba(255,107,157,0.12); }
textarea { resize:vertical; min-height:70px; }
select option { background:#fff; color:#1a1a2e; }

/* Image upload area */
.img-upload-area {
  width:100%; margin-top:8px; padding:20px; border:2px dashed rgba(0,0,0,0.13);
  border-radius:10px; text-align:center; cursor:pointer; transition:border-color 0.2s, background 0.2s;
  color:#aaa; font-size:13px; background:#f8f9fc;
}
.img-upload-area:hover { border-color:#ff6b9d; background:rgba(255,107,157,0.04); }
.img-upload-area.has-image { border-color:#6bcbff; background:rgba(107,203,255,0.05); color:#3aabdf; }
.img-upload-area .icon { font-size:28px; margin-bottom:6px; }
.img-preview-thumb { width:100%; height:80px; object-fit:cover; border-radius:6px; margin-top:8px; display:none; }
.img-preview-thumb.visible { display:block; }
.img-clear-btn { margin-top:8px; font-size:11px; color:#ff6b9d; cursor:pointer; text-decoration:underline; display:none; }
.img-clear-btn.visible { display:block; }

.img-layout-row { display:flex; gap:8px; margin-top:8px; }
.img-layout-btn {
  flex:1; padding:8px 4px; border:1px solid rgba(0,0,0,0.12); border-radius:8px;
  background:#f8f9fc; color:#999; font-size:11px; cursor:pointer; transition:all 0.2s; text-align:center;
}
.img-layout-btn.active { border-color:#ff6b9d; color:#ff6b9d; background:rgba(255,107,157,0.08); }
.badge-preset { padding:4px 12px; border-radius:999px; border:1px solid rgba(0,0,0,0.12); background:#f8f9fc; color:#666; font-size:12px; font-weight:700; cursor:pointer; transition:all 0.2s; }
.badge-preset:hover { border-color:#ff6b9d; color:#ff6b9d; }
.badge-preset.active { border-color:#ff6b9d; color:#ff6b9d; background:rgba(255,107,157,0.08); }

.color-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
.color-chip { width:32px; height:32px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform 0.15s, border-color 0.15s; box-shadow:0 2px 6px rgba(0,0,0,0.12); }
.color-chip:hover { transform:scale(1.15); }
.color-chip.active { border-color:#1a1a2e; transform:scale(1.15); }

.generate-btn { width:100%; margin-top:28px; padding:14px; border:none; border-radius:12px; background:linear-gradient(135deg,#ff6b9d,#ff9a3c); color:#fff; font-family:'M PLUS 1p',sans-serif; font-weight:900; font-size:16px; cursor:pointer; transition:opacity 0.2s, transform 0.1s; box-shadow:0 4px 16px rgba(255,107,157,0.35); }
.generate-btn:hover { opacity:0.9; transform:translateY(-1px); }
.generate-btn:disabled { opacity:0.5; cursor:not-allowed; }

.right-panel { display:flex; flex-direction:column; align-items:center; padding:32px; overflow-y:auto; gap:20px; background:#f4f5f9; }
.preview-label { font-size:11px; letter-spacing:0.1em; color:#aaa; text-transform:uppercase; align-self:flex-start; }
.poster-wrapper { width:100%; max-width:840px; position:relative; border-radius:16px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.15); }
#poster-canvas { transform-origin:top left; }

.placeholder-msg { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#ccc; gap:12px; font-size:14px; background:#f0f1f6; }
.placeholder-msg .icon { font-size:40px; }

.bottom-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.download-btn { padding:12px 28px; border:none; border-radius:10px; background:linear-gradient(135deg,#ff6b9d,#ff9a3c); color:#fff; font-family:'Noto Sans JP',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:opacity 0.2s; box-shadow:0 3px 12px rgba(255,107,157,0.3); }
.download-btn:hover { opacity:0.85; }
.download-btn:disabled { opacity:0.4; cursor:not-allowed; }
.download-btn-video { padding:12px 28px; border:2px solid #ff9a3c; border-radius:10px; background:transparent; color:#ff9a3c; font-family:'Noto Sans JP',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:background 0.2s, color 0.2s; }
.download-btn-video:hover { background:#ff9a3c; color:#fff; }
.download-btn-video:disabled { opacity:0.4; cursor:not-allowed; }
.download-btn-pptx { padding:12px 28px; border:2px solid #6bcbff; border-radius:10px; background:transparent; color:#3aabdf; font-family:'M PLUS 1p',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:background 0.2s, color 0.2s; }
.download-btn-pptx:hover { background:#6bcbff; color:#fff; }
.download-btn-pptx:disabled { opacity:0.4; cursor:not-allowed; }

/* ANIMATIONS */
@keyframes gradShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
@keyframes floatA { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(18px,-22px) scale(1.04)} 66%{transform:translate(-12px,14px) scale(0.97)} }
@keyframes floatB { 0%,100%{transform:translate(0,0)} 40%{transform:translate(-20px,18px)} 75%{transform:translate(14px,-10px)} }
@keyframes floatC { 0%,100%{transform:translate(0,0)} 50%{transform:translate(10px,16px)} }
@keyframes fadeSlideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.anim-bg { background-size:300% 300% !important; animation:gradShift 8s ease infinite; }
/* テーマ別グラデーション（アニメーション用に3色指定） */
.theme-pop    { background-image:linear-gradient(135deg,#ff6b9d,#ffd93d,#6bcbff) !important; }
.theme-ocean  { background-image:linear-gradient(135deg,#0099ff,#00c8e5,#00e5c5) !important; }
.theme-sunset { background-image:linear-gradient(135deg,#ff4e00,#ff9900,#ffcc00) !important; }
.theme-night  { background-image:linear-gradient(135deg,#6B21CE,#9B40E8,#FF6B00) !important; }
.theme-forest { background-image:linear-gradient(135deg,#4CAF30,#4CAF30,#1B5E20) !important; }
.theme-blue   { background-image:linear-gradient(135deg,#0D3F7A,#1B6BC0,#2BA8D8) !important; }
.theme-dark   { background-image:linear-gradient(135deg,#1a1a1a,#2d2d2d,#111111) !important; }
.theme-custom { background-image:linear-gradient(135deg,var(--grad-a),var(--grad-b)) !important; }
.anim-circle-a { animation:floatA 7s ease-in-out infinite; }
.anim-circle-b { animation:floatB 9s ease-in-out infinite; }
.anim-circle-c { animation:floatC 5s ease-in-out infinite; }
.anim-badge    { animation:fadeIn 0.6s ease both; animation-delay:0.1s; opacity:0; }
.anim-title    { animation:fadeSlideUp 0.7s ease both; animation-delay:0.3s; opacity:0; }
.anim-subtitle { animation:fadeSlideUp 0.7s ease both; animation-delay:0.55s; opacity:0; }
.anim-meta     { animation:fadeSlideUp 0.7s ease both; animation-delay:0.8s; opacity:0; }
</style>
</head>
<body>

<header class="app-header">
  <span style="font-size:24px">🎨</span>
  <h1>ポスタージェネレーター</h1>
</header>

<div class="main-layout">
  <div class="left-panel">
    <div class="section-title" style="margin-top:0;">📐 サイズ</div>
    <div id="size-picker" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:4px;"></div>
    <div class="section-title">📝 イベント情報</div>
    <label>イベント名 *　<span style="font-size:11px;color:#aaa;font-weight:400;">Shift+Enterで改行</span></label>
    <textarea id="inp-title" placeholder="例: デザファク夏祭り2026" rows="2" style="resize:vertical;min-height:48px;"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();}"></textarea>
    <label>サブタイトル・キャッチ</label>
    <input type="text" id="inp-subtitle" placeholder="例: AIとデザインが出会う夜" />
    <label>日時</label>
    <div style="display:flex;gap:6px;margin-bottom:6px;">
      <input type="date" id="inp-date-picker" style="flex:1;background:#f8f9fc;border:1px solid rgba(0,0,0,0.10);border-radius:8px;color:#1a1a2e;font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:8px 10px;outline:none;cursor:pointer;"
        onchange="syncDateToText()" />
      <input type="time" id="inp-time-picker" value="00:00" style="width:100px;background:#f8f9fc;border:1px solid rgba(0,0,0,0.10);border-radius:8px;color:#1a1a2e;font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:8px 10px;outline:none;cursor:pointer;"
        onchange="syncDateToText()" />
    </div>
    <input type="text" id="inp-date" placeholder="例: 2026年7月15日（水）19:00〜" style="margin-top:0;"
      oninput="clearDatePickers()" />
    <label>場所</label>
    <input type="text" id="inp-place" placeholder="例: CyberAgent渋谷オフィス" />
    <label>スローガン・補足テキスト</label>
    <textarea id="inp-slogan" placeholder="例: CREATE THE FUTURE"></textarea>
    <label>主催・ロゴテキスト</label>
    <input type="text" id="inp-organizer" placeholder="例: デザファク × AI推進チーム" />

    <div class="section-title">🖼️ 画像アップロード</div>
    <div class="img-upload-area" id="upload-area" onclick="document.getElementById('img-input').click()">
      <div class="icon">📁</div>
      <div id="upload-label">クリックまたはドロップで画像を追加</div>
      <img id="img-thumb" class="img-preview-thumb" />
    </div>
    <div class="img-clear-btn" id="img-clear-btn" onclick="clearImage()">✕ 画像を削除</div>
    <input type="file" id="img-input" accept="image/*" style="display:none" onchange="handleImageUpload(event)" />

    <label style="margin-top:16px">画像レイアウト</label>
    <div class="img-layout-row">
      <div class="img-layout-btn active" data-layout="right"  onclick="selectImgLayout(this)">◧ 右に配置</div>
      <div class="img-layout-btn"        data-layout="bottom" onclick="selectImgLayout(this)">⬓ 下に配置</div>
      <div class="img-layout-btn"        data-layout="bg"     onclick="selectImgLayout(this)">⬛ 背景に敷く</div>
    </div>

    <label style="margin-top:14px">画像サイズ <span id="img-size-val" style="color:#ffd93d;font-weight:700;">80%</span></label>
    <input type="range" id="img-size" min="40" max="100" value="80" step="5"
      style="width:100%;accent-color:#ff6b9d;cursor:pointer;"
      oninput="document.getElementById('img-size-val').textContent=this.value+'%'" />

    <label style="margin-top:10px">上下位置 <span id="img-pos-val" style="color:#ffd93d;font-weight:700;">中央</span></label>
    <input type="range" id="img-pos" min="0" max="100" value="50" step="5"
      style="width:100%;accent-color:#ff6b9d;cursor:pointer;"
      oninput="updatePosLabel(this.value)" />

    <div class="section-title">🎨 デザイン設定</div>
    <label>フォント</label>
    <div id="font-picker" style="display:flex;flex-direction:column;gap:6px;margin-top:4px;"></div>

    <label style="margin-top:16px">カラーテーマ</label>
    <div class="color-row" id="color-picker">
      <div class="color-chip active" data-theme="pop"    style="background:linear-gradient(135deg,#ff6b9d,#ffd93d)" title="ポップ"></div>
      <div class="color-chip"        data-theme="ocean"  style="background:linear-gradient(135deg,#0099ff,#00e5c5)" title="オーシャン"></div>
      <div class="color-chip"        data-theme="blue"   style="background:linear-gradient(135deg,#0D3F7A,#2BA8D8)" title="ブルー"></div>
      <div class="color-chip"        data-theme="night"  style="background:linear-gradient(135deg,#6B21CE,#9B40E8)" title="ナイト"></div>
      <div class="color-chip"        data-theme="forest" style="background:linear-gradient(135deg,#4CAF30,#1B5E20)" title="グリーン"></div>
      <div class="color-chip"        data-theme="sunset" style="background:linear-gradient(135deg,#ff4e00,#ffcc00)" title="オレンジ"></div>
      <div class="color-chip"        data-theme="dark"   style="background:linear-gradient(135deg,#1a1a1a,#3a3a3a);border:1px solid #555;" title="黒"></div>
      <div class="color-chip"        data-theme="navy"   style="background:linear-gradient(135deg,#f0f4ff,#ffffff);border:1px solid #ccd;" title="白"></div>
      <div class="color-chip"        data-theme="custom" id="chip-custom"
        style="background:linear-gradient(135deg,#ff6b9d,#ffd93d);border:2px dashed #ff6b9d;" title="カスタム">
        <span style="font-size:14px;line-height:32px;display:block;text-align:center;">✏️</span>
      </div>
    </div>
    <!-- カスタムグラデーション設定（custom選択時のみ表示） -->
    <div id="custom-grad-area" style="display:none;margin-top:12px;background:#f8f9fc;border-radius:10px;padding:12px;border:1px solid rgba(0,0,0,0.08);">
      <div style="font-size:11px;font-weight:700;color:#ff6b9d;margin-bottom:10px;letter-spacing:0.05em;">🎨 カスタムグラデーション</div>
      <div style="display:flex;gap:12px;align-items:center;">
        <div style="flex:1;text-align:center;">
          <div style="font-size:11px;color:#888;margin-bottom:4px;">カラーA</div>
          <input type="color" id="grad-color-a" value="#ff6b9d"
            style="width:48px;height:48px;border:none;border-radius:50%;cursor:pointer;padding:3px;"
            oninput="updateCustomGrad()" />
        </div>
        <div id="custom-grad-preview"
          style="flex:2;height:48px;border-radius:10px;background:linear-gradient(135deg,#ff6b9d,#ffd93d);box-shadow:0 2px 8px rgba(0,0,0,0.12);transition:background 0.3s;">
        </div>
        <div style="flex:1;text-align:center;">
          <div style="font-size:11px;color:#888;margin-bottom:4px;">カラーB</div>
          <input type="color" id="grad-color-b" value="#ffd93d"
            style="width:48px;height:48px;border:none;border-radius:50%;cursor:pointer;padding:3px;"
            oninput="updateCustomGrad()" />
        </div>
      </div>
    </div>
    <!-- 単色背景 -->
    <div style="display:flex;align-items:center;gap:10px;margin-top:14px;">
      <label style="margin:0;display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:#555;">
        <input type="checkbox" id="chk-solid" onchange="toggleSolid()"
          style="width:16px;height:16px;accent-color:#ff6b9d;cursor:pointer;" />
        単色背景にする
      </label>
      <input type="color" id="inp-solid-color" value="#ff6b9d"
        style="width:36px;height:36px;border:none;border-radius:50%;cursor:pointer;padding:2px;display:none;"
        oninput="updateSolidPreview()" />
      <div id="solid-preview" style="display:none;flex:1;height:28px;border-radius:8px;background:#ff6b9d;transition:background 0.2s;"></div>
    </div>
    <label style="margin-top:16px">テキストレイアウト</label>
    <select id="inp-layout">
      <option value="left">左寄せ（標準）</option>
      <option value="center">中央揃え</option>
    </select>
    <label style="margin-top:16px">テキストカラー</label>
    <div style="display:flex;gap:8px;margin-top:6px;align-items:center;">
      <div id="txt-color-white" onclick="selectTextColor('white')"
        style="width:36px;height:36px;border-radius:50%;background:#ffffff;border:2px solid #ff6b9d;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.15);transition:all 0.2s;" title="白"></div>
      <div id="txt-color-black" onclick="selectTextColor('black')"
        style="width:36px;height:36px;border-radius:50%;background:#1a1a2e;border:2px solid transparent;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.15);transition:all 0.2s;" title="黒"></div>
      <div style="display:flex;align-items:center;gap:6px;margin-left:4px;">
        <input type="color" id="txt-color-custom" value="#ffffff"
          style="width:36px;height:36px;border:2px solid transparent;border-radius:50%;cursor:pointer;padding:2px;background:none;overflow:hidden;"
          oninput="selectTextColor('custom')" title="カスタム" />
        <span style="font-size:11px;color:#aaa;">カスタム</span>
      </div>
    </div>
    <label style="margin-top:16px">タグ　<span style="font-size:11px;color:#aaa;font-weight:400;">空欄で非表示</span></label>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;margin-bottom:8px;" id="badge-presets">
      <div class="badge-preset active" onclick="selectBadge(this,'EVENT')">EVENT</div>
      <div class="badge-preset" onclick="selectBadge(this,'勉強会')">勉強会</div>
      <div class="badge-preset" onclick="selectBadge(this,'社内限定')">社内限定</div>
      <div class="badge-preset" onclick="selectBadge(this,'NEW')">NEW</div>
      <div class="badge-preset" onclick="selectBadge(this,'募集中')">募集中</div>
      <div class="badge-preset" onclick="selectBadge(this,'スローガン')">スローガン</div>
      <div class="badge-preset" onclick="selectBadge(this,'')">なし</div>
    </div>
    <input type="text" id="inp-badge" placeholder="自由入力も可" value="EVENT"
      oninput="clearBadgePreset()" />
    <button class="generate-btn" onclick="generatePoster()">✨ ポスターを生成する</button>
  </div>

  <div class="right-panel">
    <div class="preview-label" id="preview-label">プレビュー（1200 × 630px）</div>
    <div class="poster-wrapper" id="poster-wrapper">
      <div id="poster-canvas">
        <div class="placeholder-msg" id="placeholder">
          <span class="icon">🖼️</span>
          <span>左のフォームに情報を入力して<br>「ポスターを生成する」を押してください</span>
        </div>
      </div>
    </div>
    <div class="bottom-actions">
      <button class="download-btn"       id="dl-btn"       disabled onclick="downloadPoster()">⬇️ PNG</button>
      <button class="download-btn-video" id="dl-video-btn" disabled onclick="downloadVideo()">🎬 WebM</button>

    </div>
  </div>
</div>



<script>
var FONTS = [
  { id:'mplus',    label:'M PLUS 1p',      google:'M+PLUS+1p:wght@400;700;900',       css:'"M PLUS 1p", sans-serif' },
  { id:'shippori', label:'Shippori Mincho', google:'Shippori+Mincho:wght@400;700;800', css:'"Shippori Mincho", serif' },
  { id:'reggae',   label:'Reggae One',      google:'Reggae+One',                       css:'"Reggae One", cursive' },
];

var currentFont = FONTS[0];

// Render font picker
(function() {
  var picker = document.getElementById('font-picker');
  FONTS.forEach(function(f, i) {
    // Inject font link
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://fonts.googleapis.com/css2?family=' + f.google + '&display=swap';
    document.head.appendChild(link);

    var btn = document.createElement('div');
    btn.dataset.id = f.id;
    btn.style.cssText = 'padding:8px 12px;border-radius:8px;cursor:pointer;border:1px solid rgba(0,0,0,0.10);transition:all 0.2s;display:flex;align-items:center;justify-content:space-between;background:#f8f9fc;';
    btn.innerHTML = '<span style="font-family:' + f.css + ';font-size:15px;font-weight:700;color:#1a1a2e;">' + f.label + '</span>'
      + '<span style="font-family:' + f.css + ';font-size:12px;color:#aaa;">あAa</span>';
    if (i === 0) { btn.style.borderColor = '#ff6b9d'; btn.style.background = 'rgba(255,107,157,0.08)'; }
    btn.addEventListener('click', function() {
      document.querySelectorAll('#font-picker > div').forEach(function(b){
        b.style.borderColor = 'rgba(0,0,0,0.10)'; b.style.background = '#f8f9fc';
      });
      btn.style.borderColor = '#ff6b9d'; btn.style.background = 'rgba(255,107,157,0.08)';
      currentFont = f;
    });
    picker.appendChild(btn);
  });
})();

var SIZES = [
  { id:'16x9',   label:'16:9',   sub:'横長・標準',   w:1200, h:630  },
  { id:'4x3',    label:'4:3',    sub:'1200×900',     w:1200, h:900  },
  { id:'portal', label:'サムネ', sub:'1440×816',     w:1440, h:816  },
  { id:'a4l',    label:'A4横',   sub:'1754×1240',    w:1754, h:1240 },
  { id:'a4p',    label:'A4縦',   sub:'1240×1754',    w:1240, h:1754 },
  { id:'1x1',    label:'1:1',    sub:'正方形',        w:1080, h:1080 },
];
var currentSize = SIZES[0];

// サイズピッカー生成（scaleCanvas定義後に実行）
function initSizePicker() {
  var picker = document.getElementById('size-picker');
  if (!picker) return;
  SIZES.forEach(function(sz, i) {
    var btn = document.createElement('div');
    btn.dataset.id = sz.id;
    btn.style.cssText = 'padding:7px 8px;border-radius:8px;cursor:pointer;border:1px solid rgba(0,0,0,0.10);background:#f8f9fc;transition:all 0.2s;text-align:center;';
    btn.innerHTML = '<div style="font-size:13px;font-weight:700;color:#1a1a2e;">' + sz.label + '</div>'
                  + '<div style="font-size:10px;color:#aaa;margin-top:2px;">' + sz.sub + '</div>';
    if (i === 0) { btn.style.borderColor = '#ff6b9d'; btn.style.background = 'rgba(255,107,157,0.08)'; }
    btn.addEventListener('click', function() {
      document.querySelectorAll('#size-picker > div').forEach(function(b){
        b.style.borderColor = 'rgba(0,0,0,0.10)'; b.style.background = '#f8f9fc';
      });
      btn.style.borderColor = '#ff6b9d'; btn.style.background = 'rgba(255,107,157,0.08)';
      currentSize = sz;
      // 縦長サイズ選択時は画像レイアウトを「下に配置」に自動切替
      if (sz.h > sz.w) {
        document.querySelectorAll('.img-layout-btn').forEach(function(b){ b.classList.remove('active'); });
        var bottomBtn = document.querySelector('.img-layout-btn[data-layout="bottom"]');
        if (bottomBtn) bottomBtn.classList.add('active');
        currentImgLayout = 'bottom';
      } else {
        // 横長に戻したら「右に配置」に戻す
        document.querySelectorAll('.img-layout-btn').forEach(function(b){ b.classList.remove('active'); });
        var rightBtn = document.querySelector('.img-layout-btn[data-layout="right"]');
        if (rightBtn) rightBtn.classList.add('active');
        currentImgLayout = 'right';
      }
      scaleCanvas();
    });
    picker.appendChild(btn);
  });
}

/* ===== SOLID BACKGROUND ===== */
var useSolid = false;
function toggleSolid() {
  useSolid = document.getElementById('chk-solid').checked;
  document.getElementById('inp-solid-color').style.display = useSolid ? 'block' : 'none';
  document.getElementById('solid-preview').style.display = useSolid ? 'block' : 'none';
  // グラデ関連をグレーアウト
  var opacity = useSolid ? '0.35' : '1';
  var pointer = useSolid ? 'none' : 'auto';
  document.getElementById('color-picker').style.opacity = opacity;
  document.getElementById('color-picker').style.pointerEvents = pointer;
  document.getElementById('custom-grad-area').style.opacity = opacity;
  document.getElementById('custom-grad-area').style.pointerEvents = pointer;
}
function updateSolidPreview() {
  var c = document.getElementById('inp-solid-color').value;
  document.getElementById('solid-preview').style.background = c;
}

function updateCustomGrad() {
  var a = document.getElementById('grad-color-a').value;
  var b = document.getElementById('grad-color-b').value;
  // GRADIENTSとTHEMES更新
  GRADIENTS.custom = [a, b, b];
  THEMES.custom.accent = b;
  // チップとプレビューを更新
  var chip = document.getElementById('chip-custom');
  chip.style.background = 'linear-gradient(135deg,' + a + ',' + b + ')';
  document.getElementById('custom-grad-preview').style.background = 'linear-gradient(135deg,' + a + ',' + b + ')';
  // CSS変数を更新（theme-customクラス用）
  document.documentElement.style.setProperty('--grad-a', a);
  document.documentElement.style.setProperty('--grad-b', b);
}

/* ===== IMAGE UPLOAD ===== */
var uploadArea = document.getElementById('upload-area');
uploadArea.addEventListener('dragover', function(e){ e.preventDefault(); uploadArea.style.borderColor='#ff6b9d'; });
uploadArea.addEventListener('dragleave', function(){ uploadArea.style.borderColor=''; });
uploadArea.addEventListener('drop', function(e){
  e.preventDefault(); uploadArea.style.borderColor='';
  var file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImageFile(file);
});

function handleImageUpload(e) {
  var file = e.target.files[0];
  if (file) loadImageFile(file);
}

function loadImageFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    uploadedImageDataURL = e.target.result;
    var thumb = document.getElementById('img-thumb');
    thumb.src = uploadedImageDataURL;
    thumb.classList.add('visible');
    document.getElementById('upload-label').textContent = file.name;
    document.getElementById('upload-area').classList.add('has-image');
    document.getElementById('img-clear-btn').classList.add('visible');
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  uploadedImageDataURL = null;
  document.getElementById('img-input').value = '';
  var thumb = document.getElementById('img-thumb');
  thumb.src = ''; thumb.classList.remove('visible');
  document.getElementById('upload-label').textContent = 'クリックまたはドロップで画像を追加';
  document.getElementById('upload-area').classList.remove('has-image');
  document.getElementById('img-clear-btn').classList.remove('visible');
}

/* ===== DATE PICKER SYNC ===== */
var WEEKDAYS = ['日','月','火','水','木','金','土'];
function syncDateToText() {
  var datePicker = document.getElementById('inp-date-picker');
  var timePicker = document.getElementById('inp-time-picker');
  var dateText   = document.getElementById('inp-date');
  if (!datePicker.value) return;
  var d = new Date(datePicker.value + 'T00:00:00');
  var y = d.getFullYear(), mo = d.getMonth()+1, day = d.getDate();
  var wd = WEEKDAYS[d.getDay()];
  var str = y + '年' + mo + '月' + day + '日（' + wd + '）';
  if (timePicker.value) str += ' ' + timePicker.value + '〜';
  dateText.value = str;
}
function clearDatePickers() {
  // 手動編集したらピッカーをリセット
  document.getElementById('inp-date-picker').value = '';
  document.getElementById('inp-time-picker').value = '';
}

function updatePosLabel(v) {
  var labels = {0:'上寄せ', 25:'やや上', 50:'中央', 75:'やや下', 100:'下寄せ'};
  var closest = Object.keys(labels).reduce(function(a,b){ return Math.abs(b-v)<Math.abs(a-v)?b:a; });
  document.getElementById('img-pos-val').textContent = labels[closest] || v + '%';
}

/* ===== SCALE ===== */
function scaleCanvas() {
  var wrapper = document.getElementById('poster-wrapper');
  var canvas  = document.getElementById('poster-canvas');
  var W = currentSize.w, H = currentSize.h;
  // 縦長サイズはwrapperを狭くして縦長に見せる
  var maxW = H > W ? Math.round(400 * W / H) : 840;
  wrapper.style.maxWidth = maxW + 'px';
  var scale = wrapper.clientWidth / W;
  canvas.style.transformOrigin = 'top left';
  canvas.style.transform = 'scale(' + scale + ')';
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  wrapper.style.height = (H * scale) + 'px';
  wrapper.style.overflow = 'hidden';
  document.getElementById('preview-label').textContent = 'プレビュー（' + W + ' × ' + H + 'px）';
}
window.addEventListener('resize', scaleCanvas);
initSizePicker();

/* ===== GENERATE ===== */
function generatePoster() {
  var title     = document.getElementById('inp-title').value.trim();
  if (!title) { alert('イベント名を入力してください'); return; }
  var badge     = document.getElementById('inp-badge').value.trim();
  var subtitle  = document.getElementById('inp-subtitle').value.trim();
  var date      = document.getElementById('inp-date').value.trim();
  var place     = document.getElementById('inp-place').value.trim();
  var slogan    = document.getElementById('inp-slogan').value.trim();
  var organizer = document.getElementById('inp-organizer').value.trim();
  var layout    = document.getElementById('inp-layout').value;
  var theme     = THEMES[currentTheme];
  var grads     = GRADIENTS[currentTheme];
  var W = currentSize.w, H = currentSize.h;
  var isPortrait = H > W; // 縦長判定
  // タイトルサイズをキャンバスサイズに応じてスケール
  var baseSize = Math.round(Math.min(W, H) * (title.length > 10 ? 0.072 : 0.09));
  var titleSize = Math.min(Math.max(baseSize, 36), 96);
  var hasImage  = !!uploadedImageDataURL;
  // 縦長の場合は画像を下に配置、横長は右に
  var imgLayoutDefault = isPortrait ? 'bg' : 'right';
  var imgLayout = hasImage ? currentImgLayout : 'none';
  var imgSize   = hasImage ? parseInt(document.getElementById('img-size').value) : 100;
  var imgPos    = hasImage ? parseInt(document.getElementById('img-pos').value) : 50;
  // ダーク系・青系は白テキスト、ネイビー白系は紺テキスト
  var textColor = (currentTheme === 'dark' || currentTheme === 'blue') ? '#ffffff' : currentTheme === 'navy' ? '#1a1a2e' : theme.dark;
  var accentColor = currentTheme === 'dark' ? '#ffd93d' : currentTheme === 'navy' ? '#1a1a2e' : currentTheme === 'blue' ? '#2BA8D8' : theme.accent;
  // テキストカラー上書き
  if (currentTextColor === 'white') textColor = '#ffffff';
  else if (currentTextColor === 'black') textColor = '#1a1a2e';
  else if (currentTextColor === 'custom') textColor = document.getElementById('txt-color-custom').value;

  // Text column width depends on image layout
  var textColWidth = (hasImage && imgLayout === 'right') ? '55%' : '100%';
  var textColHeight = (hasImage && imgLayout === 'bottom') ? '50%' : '100%';
  var contentAlign = layout === 'center' ? 'align-items:center;text-align:center;' : '';

  var metaHTML = '';
  if (date)  metaHTML += '<div class="meta-pill"><div class="meta-label">DATE</div><div class="meta-val" style="color:' + textColor + ';">' + date  + '</div></div>';
  if (place) metaHTML += '<div class="meta-pill"><div class="meta-label">PLACE</div><div class="meta-val" style="color:' + textColor + ';">' + place + '</div></div>';

  // スローガン
  var sloganHTML = '';
  if (slogan) {
    if (hasImage && (imgLayout === 'right' || imgLayout === 'bottom')) {
      sloganHTML = '';
    } else {
      sloganHTML = '<div style="position:absolute;right:52px;top:50%;transform:translateY(-50%) rotate(90deg);transform-origin:center;font-size:13px;font-weight:700;letter-spacing:0.22em;color:rgba(128,128,128,0.4);white-space:nowrap;">' + slogan + '</div>';
    }
  }
  var sloganInlineHTML = (slogan && hasImage && (imgLayout === 'right' || imgLayout === 'bottom'))
    ? '<div class="anim-meta" style="margin-top:16px;font-size:12px;font-weight:700;letter-spacing:0.2em;color:' + textColor + ';opacity:0.4;text-transform:uppercase;">' + slogan + '</div>'
    : '';
  var orgHTML    = organizer ? '<div style="position:absolute;top:28px;right:80px;font-size:12px;font-weight:700;color:' + textColor + ';opacity:0.45;letter-spacing:0.08em;">' + organizer + '</div>' : '';
  var subHTML    = subtitle ? '<div class="anim-subtitle" style="font-size:20px;font-weight:700;color:' + textColor + ';opacity:0.72;margin-bottom:28px;">' + subtitle + '</div>' : '';

  var solidColor = useSolid ? document.getElementById('inp-solid-color').value : null;
  var bgStyle = solidColor
    ? 'background:' + solidColor + ';'
    : 'background:linear-gradient(135deg,' + grads[0] + ',' + grads[1] + ',' + grads[2] + ');';

  // Image HTML
  var imageHTML = '';
  if (hasImage) {
    var innerStyle = imgSize >= 100
      ? 'width:100%;height:100%;object-fit:cover;object-position:center center;'
      : 'max-width:' + imgSize + '%;max-height:' + imgSize + '%;object-fit:contain;object-position:center center;';
    var wrapAlign  = imgPos < 30 ? 'flex-start' : imgPos > 70 ? 'flex-end' : 'center';
    var flexWrapBg = 'display:flex;align-items:' + wrapAlign + ';justify-content:center;';
    var flexWrap   = imgSize >= 100 ? '' : 'display:flex;align-items:' + wrapAlign + ';justify-content:center;';
    if (imgLayout === 'right') {
      imageHTML = '<div style="position:absolute;right:0;top:0;width:48%;height:100%;overflow:hidden;' + flexWrap + '">'
        + '<img src="' + uploadedImageDataURL + '" style="' + innerStyle + '" />'
        + '<div style="position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,0.18),transparent 40%);"></div>'
        + '</div>';
    } else if (imgLayout === 'bottom') {
      // 下半分に画像、上半分はグラデ背景＋テキスト
      imageHTML = '<div style="position:absolute;left:0;bottom:0;width:100%;height:50%;overflow:hidden;' + flexWrap + '">'
        + '<img src="' + uploadedImageDataURL + '" style="' + innerStyle + '" />'
        + '<div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.15),transparent 40%);"></div>'
        + '</div>';
    } else if (imgLayout === 'bg') {
      imageHTML = '<div style="position:absolute;inset:0;overflow:hidden;' + flexWrapBg + '">'
        + '<img src="' + uploadedImageDataURL + '" style="' + innerStyle + '" />'
        + '<div style="position:absolute;inset:0;background:linear-gradient(135deg,' + grads[0] + 'cc,' + grads[2] + '99);"></div>'
        + '</div>';
      theme = { accent: THEMES[currentTheme].accent, dark: '#ffffff' };
    }
  }

  // 縦長・下配置は上下センター、左右はlayout設定に従う
  var padV = Math.round(H * 0.095);
  var padH = Math.round(W * 0.067);
  var isVerticalLayout = isPortrait || (hasImage && imgLayout === 'bottom');
  var justifyContent = 'center';
  var contentAlign = layout === 'center' ? 'align-items:center;text-align:center;' : '';

  var fontCSS = currentFont.css;
  var circleR1 = Math.round(Math.min(W,H)*0.55), circleR2 = Math.round(Math.min(W,H)*0.33), circleR3 = Math.round(Math.min(W,H)*0.1);
  var html = ''
    + '<style>'
    + '.meta-pill{background:rgba(255,255,255,0.55);border-radius:12px;padding:10px 18px;margin-right:16px;margin-bottom:8px;}'
    + '.meta-label{font-size:10px;font-weight:700;letter-spacing:0.1em;color:#555;text-transform:uppercase;margin-bottom:4px;}'
    + '.meta-val{font-size:15px;font-weight:900;font-family:' + fontCSS + ';}'
    + '</style>'
    + '<div class="' + (imgLayout === 'bg' ? '' : 'anim-bg theme-' + currentTheme) + '" style="width:' + W + 'px;height:' + H + 'px;position:relative;overflow:hidden;font-family:' + fontCSS + ';' + (imgLayout === 'bg' ? '' : bgStyle) + '">'
    +   imageHTML
    +   (imgLayout !== 'bg' ? (
          '<div class="anim-circle-a" style="position:absolute;width:' + circleR1 + 'px;height:' + circleR1 + 'px;border-radius:50%;background:rgba(255,255,255,0.18);top:-' + Math.round(circleR1*0.25) + 'px;right:-' + Math.round(circleR1*0.14) + 'px;"></div>'
        + '<div class="anim-circle-b" style="position:absolute;width:' + circleR2 + 'px;height:' + circleR2 + 'px;border-radius:50%;background:rgba(0,0,0,0.10);bottom:-' + Math.round(circleR2*0.32) + 'px;right:' + Math.round(W*0.1) + 'px;"></div>'
        + '<div class="anim-circle-c" style="position:absolute;width:' + circleR3*2 + 'px;height:' + circleR3*2 + 'px;border-radius:50%;background:rgba(255,255,255,0.30);top:' + Math.round(H*0.1) + 'px;right:' + Math.round(W*0.23) + 'px;"></div>'
      ) : '')
    +   sloganHTML
    +   orgHTML
    +   '<div style="position:absolute;inset:0;display:flex;flex-direction:column;justify-content:' + justifyContent + ';padding:' + padV + 'px ' + padH + 'px;z-index:10;width:' + textColWidth + ';height:' + textColHeight + ';' + contentAlign + '">'
    +     (badge ? '<div class="anim-badge" style="display:inline-block;background:' + textColor + ';color:' + accentColor + ';font-size:12px;font-weight:700;padding:4px 16px;border-radius:999px;margin-bottom:20px;width:fit-content;letter-spacing:0.1em;">' + badge + '</div>' : '')
    +     '<div class="anim-title" style="font-size:' + titleSize + 'px;font-weight:900;line-height:1.05;color:' + textColor + ';text-shadow:3px 3px 0 rgba(128,128,128,0.15);margin-bottom:14px;white-space:pre-wrap;">' + title + '</div>'
    +     subHTML
    +     '<div class="anim-meta" style="display:flex;flex-wrap:wrap;">' + metaHTML + '</div>'
    +     sloganInlineHTML
    +   '</div>'
    + '</div>';

  var canvas = document.getElementById('poster-canvas');
  var ph = document.getElementById('placeholder');
  if (ph) ph.remove();
  canvas.innerHTML = html;

  currentPosterData = { title:title, badge:badge, subtitle:subtitle, date:date, place:place, slogan:slogan, organizer:organizer, layout:layout, theme:currentTheme, imgDataURL:uploadedImageDataURL, imgLayout:imgLayout, imgSize:imgSize, imgPos:imgPos, fontCSS:currentFont.css, fontGoogle:currentFont.google, size:currentSize, textColor:textColor, solidColor:solidColor };
  scaleCanvas();
  document.getElementById('dl-btn').disabled = false;
  document.getElementById('dl-video-btn').disabled = false;
}

/* ========== PNG DOWNLOAD（Canvas直接描画） ========== */
async function downloadPoster() {
  if (!currentPosterData) return;
  var btn = document.getElementById('dl-btn');
  btn.disabled = true; btn.textContent = '⏳ 生成中...';
  try {
    var d = currentPosterData;
    var theme = THEMES[d.theme];
    var grads = GRADIENTS[d.theme];
    var sz = d.size || SIZES[0];
    var W = sz.w, H = sz.h;
    var baseSize = Math.round(Math.min(W,H) * (d.title.length > 10 ? 0.072 : 0.09));
    var titleSize = Math.min(Math.max(baseSize, 36), 96);
    var hasImage = !!d.imgDataURL;
    var imgLayout = d.imgLayout || 'none';
    var imgSize = d.imgSize !== undefined ? d.imgSize : 100;
    var imgPos  = d.imgPos  !== undefined ? d.imgPos  : 50;
    var darkColor = d.textColor ? d.textColor
                  : (hasImage && imgLayout === 'bg') ? '#ffffff'
                  : (d.theme === 'dark' || d.theme === 'blue') ? '#ffffff'
                  : d.theme === 'navy'  ? '#1a1a2e'
                  : theme.dark;
    var accentColor = d.theme === 'dark' ? '#ffd93d' : d.theme === 'navy' ? '#1a1a2e' : d.theme === 'blue' ? '#2BA8D8' : theme.accent;

    var canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    var ctx = canvas.getContext('2d');

    // 画像プリロード
    var imgEl = null;
    if (hasImage) {
      imgEl = new Image();
      await new Promise(function(res){ imgEl.onload = res; imgEl.src = d.imgDataURL; });
    }

    // --- 背景 ---
    if (hasImage && imgLayout === 'bg') {
      ctx.save(); ctx.beginPath(); ctx.rect(0,0,W,H); ctx.clip();
      drawImageCover(ctx, imgEl, 0, 0, W, H, imgSize, imgPos);
      ctx.restore();
      var ov = ctx.createLinearGradient(0,0,W,H);
      ov.addColorStop(0, grads[0]+'cc'); ov.addColorStop(1, grads[2]+'99');
      ctx.fillStyle = ov; ctx.fillRect(0,0,W,H);
    } else if (d.solidColor) {
      // 単色背景
      ctx.fillStyle = d.solidColor; ctx.fillRect(0,0,W,H);
    } else {
      // グラデーション背景
      var p = 0.5;
      var grad = ctx.createLinearGradient(0, 0, W*(0.4+p*0.6), H);
      grad.addColorStop(0, grads[0]); grad.addColorStop(0.5, grads[1]); grad.addColorStop(1, grads[2]);
      ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

      // デコ円
      ctx.save();
      ctx.globalAlpha=0.18; ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(W*0.958, H*0.175, Math.min(W,H)*0.37, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.10; ctx.fillStyle='#000';
      ctx.beginPath(); ctx.arc(W*0.9, H*0.865, Math.min(W,H)*0.26, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.30; ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(W*0.8, H*0.159, Math.min(W,H)*0.08, 0, Math.PI*2); ctx.fill();
      ctx.restore();

      // 右側画像パネル
      if (hasImage && imgLayout === 'right') {
        var imgPanelX = Math.round(W * 0.48);
        ctx.save(); ctx.beginPath(); ctx.rect(imgPanelX,0,W-imgPanelX,H); ctx.clip();
        drawImageCover(ctx, imgEl, imgPanelX, 0, W-imgPanelX, H, imgSize, imgPos);
        var fade = ctx.createLinearGradient(imgPanelX,0,imgPanelX+Math.round(W*0.2),0);
        fade.addColorStop(0,'rgba(0,0,0,0.18)'); fade.addColorStop(1,'transparent');
        ctx.fillStyle=fade; ctx.fillRect(imgPanelX,0,W-imgPanelX,H);
        ctx.restore();
      }
      // 下側画像パネル
      if (hasImage && imgLayout === 'bottom') {
        var imgPanelY = Math.round(H * 0.5);
        ctx.save(); ctx.beginPath(); ctx.rect(0,imgPanelY,W,H-imgPanelY); ctx.clip();
        drawImageCover(ctx, imgEl, 0, imgPanelY, W, H-imgPanelY, imgSize, imgPos);
        var fadeB = ctx.createLinearGradient(0,imgPanelY,0,imgPanelY+Math.round(H*0.12));
        fadeB.addColorStop(0,'rgba(0,0,0,0.15)'); fadeB.addColorStop(1,'transparent');
        ctx.fillStyle=fadeB; ctx.fillRect(0,imgPanelY,W,H-imgPanelY);
        ctx.restore();
      }
    }

    // --- テキスト共通設定 ---
    var textAlign = d.layout === 'center' ? 'center' : 'left';
    var isPortrait = H > W;
    var isBottom = (hasImage && imgLayout === 'bottom');
    var isVerticalLayout = isPortrait || isBottom;
    var pad = Math.round(W * 0.067);
    var textAlignPNG = d.layout === 'center' ? 'center' : 'left';
    var textX = textAlignPNG === 'center'
      ? (hasImage && imgLayout==='right' ? W*0.27 : W*0.5)
      : pad;
    var textColW = (hasImage && imgLayout==='right') ? W*0.52 : W;
    var badgeY = isVerticalLayout ? Math.round(H * 0.27) : Math.round(H * 0.27);
    var titleY = isVerticalLayout ? Math.round(H * 0.38) + titleSize * 0.75 : Math.round(H * 0.38) + titleSize * 0.75;
    var pillarX = Math.round(W * 0.963);

    // 主催
    if (d.organizer) {
      ctx.textAlign='right'; ctx.font='700 12px sans-serif';
      ctx.fillStyle='rgba(0,0,0,0.40)';
      ctx.fillText(d.organizer, W-80, 48);
    }
    // スローガン（縦書き風、右端）
    if (d.slogan && !(hasImage && imgLayout==='right')) {
      ctx.save(); ctx.translate(pillarX, H*0.5); ctx.rotate(Math.PI/2);
      ctx.font='700 12px sans-serif'; ctx.fillStyle='rgba(128,128,128,0.4)'; ctx.textAlign='center';
      ctx.fillText(d.slogan.toUpperCase(),0,0); ctx.restore();
    }

    // EVENTバッジ（空欄なら非表示）
    if (d.badge) {
      var bx = textAlignPNG === 'center' ? W*0.5 - 40 : textX - (textAlignPNG==='center'?40:0);
      ctx.fillStyle = darkColor;
      rrect(ctx, bx, badgeY, ctx.measureText(d.badge) && (function(){ ctx.font='700 12px sans-serif'; return ctx.measureText(d.badge).width; })() + 32, 28, 14); ctx.fill();
      ctx.fillStyle = accentColor; ctx.font='700 12px sans-serif'; ctx.textAlign='left';
      ctx.fillText(d.badge, bx+16, badgeY+18);
    }

    // タイトル（\n で手動改行 + 自動折り返し）
    ctx.fillStyle = darkColor; ctx.textAlign = textAlignPNG;
    ctx.font = '900 '+titleSize+'px sans-serif';
    var maxTW = (hasImage && imgLayout==='right') ? W*0.42 : W*0.87;
    var manualLines = d.title.split('\n');
    var lines = [];
    manualLines.forEach(function(ml) { wrapText(ctx, ml, maxTW).forEach(function(l){ lines.push(l); }); });
    var ty = titleY;
    lines.forEach(function(line) {
      ctx.fillText(line, textX, ty); ty += titleSize * 1.1;
    });

    // サブタイトル
    if (d.subtitle) {
      ty += 10;
      ctx.globalAlpha=0.72; ctx.font='700 '+Math.round(H*0.032)+'px sans-serif'; ctx.textAlign=textAlignPNG;
      ctx.fillStyle=darkColor; ctx.fillText(d.subtitle, textX, ty); ctx.globalAlpha=1;
      ty += Math.round(H*0.06);
    } else { ty += 10; }

    // スローガン（右に画像がある場合は左下に横書き）
    if (d.slogan && hasImage && imgLayout==='right') {
      ctx.globalAlpha=0.4; ctx.font='700 12px sans-serif'; ctx.textAlign=textAlignPNG;
      ctx.fillStyle=darkColor; ctx.fillText(d.slogan.toUpperCase(), textX, ty+10); ctx.globalAlpha=1;
      ty += 28;
    }

    // DATEとPLACEのピル
    var pills = [];
    if (d.date)  pills.push({label:'DATE',  val:d.date});
    if (d.place) pills.push({label:'PLACE', val:d.place});
    function pillWidth(pill) {
      ctx.font='700 10px sans-serif';
      var lw = ctx.measureText(pill.label).width;
      ctx.font='900 15px sans-serif';
      var vw = ctx.measureText(pill.val).width;
      return Math.max(lw, vw) + 40;
    }
    // センター配置の場合はピル群を中央揃え
    var totalPillW = 0;
    pills.forEach(function(p){ totalPillW += pillWidth(p) + 16; });
    var mx = textAlignPNG === 'center' ? (textColW - totalPillW) / 2 : pad;
    pills.forEach(function(pill) {
      var vw = pillWidth(pill);
      ctx.fillStyle='rgba(255,255,255,0.5)'; rrect(ctx,mx,ty,vw,54,12); ctx.fill();
      ctx.font='700 10px sans-serif'; ctx.fillStyle='#555'; ctx.textAlign='left';
      ctx.fillText(pill.label, mx+18, ty+18);
      ctx.font='900 15px sans-serif'; ctx.fillStyle=darkColor;
      ctx.fillText(pill.val, mx+18, ty+38);
      mx += vw+16;
    });

    // ダウンロード
    var link = document.createElement('a');
    link.download = 'event-poster.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) { alert('ダウンロードに失敗しました: ' + e.message); }
  btn.disabled = false; btn.textContent = '⬇️ PNG';
}

// テキスト折り返しヘルパー
function wrapText(ctx, text, maxWidth) {
  var words = text.split('');
  var lines = [], line = '';
  for (var i=0; i<words.length; i++) {
    var test = line + words[i];
    if (ctx.measureText(test).width > maxWidth && line.length > 0) {
      lines.push(line); line = words[i];
    } else { line = test; }
  }
  if (line) lines.push(line);
  return lines;
}

// 画像をプレビューと同じロジックでCanvasに描画してbase64で返す
function cropImageToCanvas(dataURL, w, h, sizePercent, posPercent) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var c = document.createElement('canvas');
      c.width = w; c.height = h;
      var ctx = c.getContext('2d');
      var iw = img.naturalWidth, ih = img.naturalHeight;
      if (sizePercent >= 100) {
        // coverモード: パネル全体を埋める
        var scale = Math.max(w / iw, h / ih);
        var dw = iw * scale, dh = ih * scale;
        var dx = (w - dw) * 0.5;
        var dy = (h - dh) * (posPercent / 100);
        ctx.drawImage(img, dx, dy, dw, dh);
      } else {
        // containモード: 見切れなし、指定サイズに縮小
        var scale = Math.min(w / iw, h / ih) * (sizePercent / 100);
        var dw = iw * scale, dh = ih * scale;
        var dx = (w - dw) * 0.5;
        var dy = (h - dh) * (posPercent / 100);
        ctx.drawImage(img, dx, dy, dw, dh);
      }
      resolve(c.toDataURL('image/png'));
    };
    img.src = dataURL;
  });
}

function buildPosterHTML(d, processedImgURL) {

  var orgHTML    = d.organizer ? '<div style="position:absolute;top:28px;right:80px;font-size:12px;font-weight:700;color:rgba(0,0,0,0.40);letter-spacing:0.08em;">' + d.organizer + '</div>' : '';
  var subHTML    = d.subtitle ? '<div style="font-size:20px;font-weight:700;color:' + darkColor + ';opacity:0.72;margin-bottom:28px;">' + d.subtitle + '</div>' : '';

  var imageHTML = '';
  if (hasImage) {
    var imgSrc = processedImgURL || d.imgDataURL;
    // processedImgURLは既にCanvas側でクロップ済みなのでobject-fit不要
    var imgStyle = processedImgURL
      ? 'width:100%;height:100%;display:block;'
      : 'width:100%;height:100%;object-fit:cover;';
    if (imgLayout === 'right') {
      imageHTML = '<div style="position:absolute;right:0;top:0;width:48%;height:100%;overflow:hidden;">'

    } else if (imgLayout === 'bg') {
      imageHTML = '<div style="position:absolute;inset:0;overflow:hidden;">'
        + '<img src="' + imgSrc + '" style="' + imgStyle + '" />'
        + '<div style="position:absolute;inset:0;background:linear-gradient(135deg,' + grads[0] + 'cc,' + grads[2] + '99);"></div></div>';
    }
  }

  var bgStyle = (imgLayout === 'bg') ? '' : 'background:linear-gradient(135deg,' + grads[0] + ',' + grads[1] + ',' + grads[2] + ') center/cover no-repeat;';
  var decoHTML = (imgLayout !== 'bg') ? ('<div style="position:absolute;width:560px;height:560px;border-radius:50%;background:rgba(255,255,255,0.18);top:-140px;right:-80px;"></div><div style="position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(0,0,0,0.10);bottom:-100px;right:140px;"></div><div style="position:absolute;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,0.30);top:70px;right:310px;"></div>') : '';

  var fontCSS    = d.fontCSS || '"Noto Sans JP", sans-serif';
  var fontGoogle = d.fontGoogle || 'Noto+Sans+JP:wght@400;700;900';

  return '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    + '<link href="https://fonts.googleapis.com/css2?family=' + fontGoogle + '&display=swap" rel="stylesheet">'
    + '<style>*{margin:0;padding:0;box-sizing:border-box;}body{width:1200px;height:630px;overflow:hidden;font-family:' + fontCSS + ';}</style>'
    + '</head><body>'
    + '<div style="width:1200px;height:630px;position:relative;overflow:hidden;font-family:' + fontCSS + ';' + bgStyle + '">'
    +   imageHTML + decoHTML + sloganHTML + orgHTML
    +   '<div style="position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:60px 80px;z-index:10;width:' + textColWidth + ';">'
    +     '<div style="display:inline-block;background:' + darkColor + ';color:' + accentColor + ';font-size:12px;font-weight:700;padding:4px 16px;border-radius:999px;margin-bottom:20px;width:fit-content;letter-spacing:0.1em;">EVENT</div>'
    +     '<div style="font-size:' + titleSize + 'px;font-weight:900;line-height:1.05;color:' + darkColor + ';margin-bottom:14px;">' + d.title + '</div>'
    +     subHTML
    +     '<div style="display:flex;flex-wrap:wrap;">' + metaHTML + '</div>'
    +   '</div>'
    + '</div>'
    + '</body></html>';
}

      // クロップ済みなのでsizingは指定しない（比率そのまま）

      }
    }

    var textW = (d.imgDataURL && d.imgLayout === 'right') ? 6.0 : 10;

    slide.addText(d.title, { x:0.8, y:1.7, w:textW, h:2.2, fontSize: titleSize, bold:true, color: tColor, fontFace: fontFace, valign:'top', shrinkText:true });

    // サブタイトル
    var nextY = d.title.length > 10 ? 3.8 : 3.6;
    if (d.subtitle) {
      slide.addText(d.subtitle, { x:0.8, y: nextY, w:textW, h:0.6, fontSize:18, bold:true, color: tColor, fontFace: fontFace, transparency:30 });

    // 日時・場所メタ情報
    if (d.date || d.place) {
      var metaX = 0.8;
      if (d.date) {

        slide.addText([{ text:'DATE\n', options:{ fontSize:9, bold:true, color:'555555', breakLine:true } }, { text:d.date, options:{ fontSize:13, bold:true, color: tColor } }], { x:metaX+0.15, y:nextY+0.06, w:2.9, h:0.6, fontFace: fontFace, valign:'top' });
        metaX += 3.4;
      }
      if (d.place) {
        slide.addShape(pres.ShapeType.roundRect, { x:metaX, y:nextY, w:3.2, h:0.72, fill:{ color:'ffffff', transparency:45 }, line:{ color:'ffffff', transparency:45 }, rectRadius:0.1 });
        slide.addText([{ text:'PLACE\n', options:{ fontSize:9, bold:true, color:'555555', breakLine:true } }, { text:d.place, options:{ fontSize:13, bold:true, color: tColor } }], { x:metaX+0.15, y:nextY+0.06, w:2.9, h:0.6, fontFace: fontFace, valign:'top' });
      }
    }

    // スローガン（右端縦書き風）
    if (d.slogan && !(d.imgDataURL && d.imgLayout === 'right')) {
      slide.addText(d.slogan.toUpperCase(), { x:12.0, y:1.5, w:1, h:5, fontSize:10, bold:true, color: tColor, fontFace: fontFace, transparency:70, rotate:90, align:'center' });

    }

    await pres.writeFile({ fileName: 'event-poster.pptx' });

  } catch(e) {
    console.error(e);
    alert('PPTXの生成に失敗しました: ' + e.message);
  }
  btn.disabled = false; btn.textContent = '📊 PPTX';
}

/* ========== VIDEO DOWNLOAD ========== */
async function downloadVideo() {
  if (!currentPosterData) return;
  var btn = document.getElementById('dl-video-btn');
  btn.disabled = true; btn.textContent = '⏳ 録画中（5秒）...';
  try {
    var d = currentPosterData;
    var theme = THEMES[d.theme];
    var grads = GRADIENTS[d.theme];
    var titleSize = d.title.length > 10 ? 54 : 68;
    var hasImage = !!d.imgDataURL;
    var imgLayout = d.imgLayout || 'none';
    var darkColor = (hasImage && imgLayout === 'bg') ? '#ffffff' : theme.dark;

    var offscreen = document.createElement('canvas');
    offscreen.width = 1200; offscreen.height = 630;
    var ctx = offscreen.getContext('2d');

    // Pre-load image if any
    var imgEl = null;
    if (hasImage) {
      imgEl = new Image();
      await new Promise(function(res){ imgEl.onload = res; imgEl.src = d.imgDataURL; });
    }

    var stream = offscreen.captureStream(30);
    var recorder = new MediaRecorder(stream, { mimeType:'video/webm;codecs=vp9' });
    var chunks = [];
    recorder.ondataavailable = function(e){ chunks.push(e.data); };

    var startTime = performance.now();
    var DURATION = 5000;
    recorder.start();

    function drawFrame(now) {
      var t = (now - startTime) / 1000;
      var elapsed = now - startTime;
      ctx.clearRect(0, 0, 1200, 630);

      if (hasImage && imgLayout === 'bg') {
        // 背景画像を全面に描画
        ctx.save();
        ctx.beginPath(); ctx.rect(0, 0, 1200, 630); ctx.clip();
        drawImageCover(ctx, imgEl, 0, 0, 1200, 630, d.imgSize || 100, d.imgPos !== undefined ? d.imgPos : 50);
        ctx.restore();
        // グラデーションオーバーレイ
        var overlay = ctx.createLinearGradient(0, 0, 1200, 630);
        overlay.addColorStop(0, grads[0] + 'cc');
        overlay.addColorStop(1, grads[2] + '99');
        ctx.fillStyle = overlay;
        ctx.fillRect(0, 0, 1200, 630);
      } else {
        // Animated gradient bg
        var p = (Math.sin(t * 0.4) * 0.5 + 0.5);
        var grad = ctx.createLinearGradient(0, 0, 1200 * (0.4 + p * 0.6), 630);
        grad.addColorStop(0, grads[0]); grad.addColorStop(0.5, grads[1]); grad.addColorStop(1, grads[2]);
        ctx.fillStyle = grad; ctx.fillRect(0, 0, 1200, 630);

        // Right image panel
        if (hasImage && imgLayout === 'right') {
          ctx.save(); ctx.beginPath(); ctx.rect(576, 0, 624, 630); ctx.clip();
          drawImageCover(ctx, imgEl, 576, 0, 624, 630, d.imgSize || 100, d.imgPos !== undefined ? d.imgPos : 50);
          var fadeGrad = ctx.createLinearGradient(576, 0, 820, 0);
          fadeGrad.addColorStop(0, 'rgba(0,0,0,0.18)'); fadeGrad.addColorStop(1, 'transparent');
          ctx.fillStyle = fadeGrad; ctx.fillRect(576, 0, 624, 630);
          ctx.restore();
        }

        // Floating circles
        var ax = Math.sin(t*0.7)*18, ay = Math.cos(t*0.5)*22;
        var bx = Math.cos(t*0.6)*20, by = Math.sin(t*0.4)*18;
        var cx2 = Math.sin(t*1.1)*10, cy2 = Math.cos(t*0.9)*16;
        ctx.save();
        ctx.globalAlpha=0.18; ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(1150+ax, 110+ay, 280, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha=0.10; ctx.fillStyle='#000';
        ctx.beginPath(); ctx.arc(1080+bx, 545+by, 200, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha=0.30; ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(960+cx2, 100+cy2, 60, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }

      // Organizer & Slogan text
      if (d.organizer) {
        ctx.textAlign='right'; ctx.font='700 12px sans-serif'; ctx.fillStyle='rgba(0,0,0,0.40)';
        ctx.fillText(d.organizer, 1120, 48);
      }
      if (d.slogan) {
        ctx.save(); ctx.translate(1156,315); ctx.rotate(Math.PI/2);
        ctx.font='700 12px sans-serif'; ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.textAlign='center';
        ctx.fillText(d.slogan.toUpperCase(), 0, 0); ctx.restore();
      }

      function fade(start, dur) { return Math.min(1, Math.max(0, (t - start) / dur)); }

      var ba = fade(0.1, 0.5);
      if (ba > 0) {
        ctx.globalAlpha=ba; ctx.fillStyle=darkColor;
        rrect(ctx, 80, 170, 80, 28, 14); ctx.fill();
        ctx.fillStyle=theme.accent; ctx.font='700 12px sans-serif'; ctx.textAlign='left';
        ctx.fillText('EVENT', 96, 189); ctx.globalAlpha=1;
      }
      var ta = fade(0.3, 0.6), to = (1-ta)*24;
      if (ta > 0) {
        ctx.globalAlpha=ta; ctx.fillStyle=darkColor;
        ctx.font='900 ' + titleSize + 'px sans-serif'; ctx.textAlign='left';
        var titleLines2 = d.title.split('\n');
        var tly = 240+titleSize*0.75+to;
        titleLines2.forEach(function(line){ ctx.fillText(line, 80, tly); tly += titleSize*1.1; });
        ctx.globalAlpha=1;
      }
      if (d.subtitle) {
        var sa=fade(0.55,0.6), so=(1-sa)*24;
        if (sa>0){ ctx.globalAlpha=sa*0.72; ctx.fillStyle=darkColor; ctx.font='700 20px sans-serif'; ctx.fillText(d.subtitle,80,345+so); ctx.globalAlpha=1; }
      }
      var ma=fade(0.8,0.6), mo=(1-ma)*24;
      if (ma>0) {
        var metaY=d.subtitle?385:355;
        var items=[];
        if (d.date)  items.push({label:'DATE',val:d.date});
        if (d.place) items.push({label:'PLACE',val:d.place});
        var mx2=80; ctx.globalAlpha=ma;
        for (var i=0;i<items.length;i++) {
          ctx.font='700 10px sans-serif';
          var lw2=ctx.measureText(items[i].label).width;
          ctx.font='900 15px sans-serif';
          var vw2=ctx.measureText(items[i].val).width;
          var vw=Math.max(lw2,vw2)+40;
          ctx.fillStyle='rgba(255,255,255,0.5)'; rrect(ctx,mx2,metaY+mo,vw,54,12); ctx.fill();
          ctx.font='700 10px sans-serif'; ctx.fillStyle='#555'; ctx.fillText(items[i].label,mx2+18,metaY+18+mo);
          ctx.font='900 15px sans-serif'; ctx.fillStyle=darkColor; ctx.fillText(items[i].val,mx2+18,metaY+38+mo);
          mx2+=vw+16;
        }
        ctx.globalAlpha=1;
      }

      if (elapsed < DURATION) { requestAnimationFrame(drawFrame); }
      else { recorder.stop(); }
    }
    requestAnimationFrame(drawFrame);

    await new Promise(function(res){ recorder.onstop=res; });
    var blob = new Blob(chunks,{type:'video/webm'});
    var url = URL.createObjectURL(blob);
    var link = document.createElement('a');
    link.download='event-banner.webm'; link.href=url; link.click();
    URL.revokeObjectURL(url);
  } catch(e) { alert('動画生成に失敗しました: ' + e.message); }
  btn.disabled=false; btn.textContent='🎬 動画をダウンロード（WebM）';
}

function drawImageCover(ctx, img, dx, dy, dw, dh, sizePercent, posPercent) {
  var iw = img.naturalWidth, ih = img.naturalHeight;
  var scale, drawW, drawH, offsetX, offsetY;
  if (sizePercent >= 100) {
    // coverモード: パネル全体を埋める
    scale = Math.max(dw / iw, dh / ih);
    drawW = iw * scale; drawH = ih * scale;
    offsetX = (dw - drawW) * 0.5;
    offsetY = (dh - drawH) * (posPercent / 100);
  } else {
    // containモード: 見切れなし、縮小
    scale = Math.min(dw / iw, dh / ih) * (sizePercent / 100);
    drawW = iw * scale; drawH = ih * scale;
    offsetX = (dw - drawW) * 0.5;
    offsetY = (dh - drawH) * (posPercent / 100);
  }
  ctx.drawImage(img, dx + offsetX, dy + offsetY, drawW, drawH);
}

function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}
