<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 イベントポスタージェネレーター</title>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GV48825354"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-GV48825354');
</script>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Dela+Gothic+One&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans JP',sans-serif; background:#f4f5f9; color:#1a1a2e; min-height:100vh; }

.app-header { padding:24px 32px; display:flex; align-items:center; gap:12px; border-bottom:1px solid rgba(0,0,0,0.07); background:#fff; }
.app-header h1 { font-family:'M PLUS 1p',sans-serif; font-size:22px; font-weight:900; background:linear-gradient(90deg,#ff6b9d,#ff9a3c,#6bcbff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

.main-layout { display:grid; grid-template-columns:380px 1fr; height:calc(100vh - 73px); }

.left-panel { background:#fff; border-right:1px solid rgba(0,0,0,0.07); overflow-y:auto; padding:24px; }
.section-title { font-size:11px; font-weight:700; letter-spacing:0.15em; color:#ff6b9d; text-transform:uppercase; margin-bottom:12px; margin-top:24px; }
.section-title:first-child { margin-top:0; }
label { display:block; font-size:13px; color:#555; margin-bottom:6px; margin-top:14px; }
input[type="text"], textarea, select { width:100%; background:#f8f9fc; border:1px solid rgba(0,0,0,0.10); border-radius:8px; color:#1a1a2e; font-family:'Noto Sans JP',sans-serif; font-size:13px; padding:10px 12px; outline:none; transition:border-color 0.2s; }
input[type="text"]:focus, textarea:focus, select:focus { border-color:#ff6b9d; box-shadow:0 0 0 3px rgba(255,107,157,0.12); }
textarea { resize:vertical; min-height:70px; }
select option { background:#fff; color:#1a1a2e; }

/* Image upload area */
.img-upload-area {
  width:100%; margin-top:8px; padding:20px; border:2px dashed rgba(0,0,0,0.13);
  border-radius:10px; text-align:center; cursor:pointer; transition:border-color 0.2s, background 0.2s;
  color:#aaa; font-size:13px; background:#f8f9fc;
}
.img-upload-area:hover { border-color:#ff6b9d; background:rgba(255,107,157,0.04); }
.img-upload-area.has-image { border-color:#6bcbff; background:rgba(107,203,255,0.05); color:#3aabdf; }
.img-upload-area .icon { font-size:28px; margin-bottom:6px; }
.img-preview-thumb { width:100%; height:80px; object-fit:cover; border-radius:6px; margin-top:8px; display:none; }
.img-preview-thumb.visible { display:block; }
.img-clear-btn { margin-top:8px; font-size:11px; color:#ff6b9d; cursor:pointer; text-decoration:underline; display:none; }
.img-clear-btn.visible { display:block; }

.img-layout-row { display:flex; gap:8px; margin-top:8px; }
.img-layout-btn {
  flex:1; padding:8px 4px; border:1px solid rgba(0,0,0,0.12); border-radius:8px;
  background:#f8f9fc; color:#999; font-size:11px; cursor:pointer; transition:all 0.2s; text-align:center;
}
.img-layout-btn.active { border-color:#ff6b9d; color:#ff6b9d; background:rgba(255,107,157,0.08); }

.color-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
.color-chip { width:32px; height:32px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform 0.15s, border-color 0.15s; box-shadow:0 2px 6px rgba(0,0,0,0.12); }
.color-chip:hover { transform:scale(1.15); }
.color-chip.active { border-color:#1a1a2e; transform:scale(1.15); }

.generate-btn { width:100%; margin-top:28px; padding:14px; border:none; border-radius:12px; background:linear-gradient(135deg,#ff6b9d,#ff9a3c); color:#fff; font-family:'M PLUS 1p',sans-serif; font-weight:900; font-size:16px; cursor:pointer; transition:opacity 0.2s, transform 0.1s; box-shadow:0 4px 16px rgba(255,107,157,0.35); }
.generate-btn:hover { opacity:0.9; transform:translateY(-1px); }
.generate-btn:disabled { opacity:0.5; cursor:not-allowed; }

.right-panel { display:flex; flex-direction:column; align-items:center; padding:32px; overflow-y:auto; gap:20px; background:#f4f5f9; }
.preview-label { font-size:11px; letter-spacing:0.1em; color:#aaa; text-transform:uppercase; align-self:flex-start; }
.poster-wrapper { width:100%; max-width:840px; position:relative; border-radius:16px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.15); }
#poster-canvas { transform-origin:top left; }

.placeholder-msg { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#ccc; gap:12px; font-size:14px; background:#f0f1f6; }
.placeholder-msg .icon { font-size:40px; }

.bottom-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.download-btn { padding:12px 28px; border:none; border-radius:10px; background:linear-gradient(135deg,#ff6b9d,#ff9a3c); color:#fff; font-family:'Noto Sans JP',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:opacity 0.2s; box-shadow:0 3px 12px rgba(255,107,157,0.3); }
.download-btn:hover { opacity:0.85; }
.download-btn:disabled { opacity:0.4; cursor:not-allowed; }
.download-btn-video { padding:12px 28px; border:2px solid #ff9a3c; border-radius:10px; background:transparent; color:#ff9a3c; font-family:'Noto Sans JP',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:background 0.2s, color 0.2s; }
.download-btn-video:hover { background:#ff9a3c; color:#fff; }
.download-btn-video:disabled { opacity:0.4; cursor:not-allowed; }
.download-btn-pptx { padding:12px 28px; border:2px solid #6bcbff; border-radius:10px; background:transparent; color:#3aabdf; font-family:'M PLUS 1p',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:background 0.2s, color 0.2s; }
.download-btn-pptx:hover { background:#6bcbff; color:#fff; }
.download-btn-pptx:disabled { opacity:0.4; cursor:not-allowed; }

/* ANIMATIONS */
@keyframes gradShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
@keyframes floatA { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(18px,-22px) scale(1.04)} 66%{transform:translate(-12px,14px) scale(0.97)} }
@keyframes floatB { 0%,100%{transform:translate(0,0)} 40%{transform:translate(-20px,18px)} 75%{transform:translate(14px,-10px)} }
@keyframes floatC { 0%,100%{transform:translate(0,0)} 50%{transform:translate(10px,16px)} }
@keyframes fadeSlideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.anim-bg { background-size:300% 300% !important; animation:gradShift 8s ease infinite; }
/* テーマ別グラデーション（アニメーション用に3色指定） */
.theme-pop    { background-image:linear-gradient(135deg,#ff6b9d,#ffd93d,#6bcbff) !important; }
.theme-ocean  { background-image:linear-gradient(135deg,#0099ff,#00c8e5,#00e5c5) !important; }
.theme-sunset { background-image:linear-gradient(135deg,#ff4e00,#ff9900,#ffcc00) !important; }
.theme-night  { background-image:linear-gradient(135deg,#7b2fff,#cc44ff,#ff6bff) !important; }
.theme-forest { background-image:linear-gradient(135deg,#00c853,#66dd00,#aaff00) !important; }
.theme-dark   { background-image:linear-gradient(135deg,#1a1a1a,#2d2d2d,#111111) !important; }
.theme-navy   { background-image:linear-gradient(135deg,#f8f9ff,#e8edf8,#ffffff) !important; }
.anim-circle-a { animation:floatA 7s ease-in-out infinite; }
.anim-circle-b { animation:floatB 9s ease-in-out infinite; }
.anim-circle-c { animation:floatC 5s ease-in-out infinite; }
.anim-badge    { animation:fadeIn 0.6s ease both; animation-delay:0.1s; opacity:0; }
.anim-title    { animation:fadeSlideUp 0.7s ease both; animation-delay:0.3s; opacity:0; }
.anim-subtitle { animation:fadeSlideUp 0.7s ease both; animation-delay:0.55s; opacity:0; }
.anim-meta     { animation:fadeSlideUp 0.7s ease both; animation-delay:0.8s; opacity:0; }
</style>
</head>
<body>

<header class="app-header">
  <span style="font-size:24px">🎨</span>
  <h1>イベントポスタージェネレーター</h1>
</header>

<div class="main-layout">
  <div class="left-panel">
    <div class="section-title">📝 イベント情報</div>
    <label>イベント名 *　<span style="font-size:11px;color:#aaa;font-weight:400;">Shift+Enterで改行</span></label>
    <textarea id="inp-title" placeholder="例: デザファク夏祭り2026" rows="2" style="resize:vertical;min-height:48px;"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();}"></textarea>
    <label>サブタイトル・キャッチ</label>
    <input type="text" id="inp-subtitle" placeholder="例: AIとデザインが出会う夜" />
    <label>日時</label>
    <input type="text" id="inp-date" placeholder="例: 2026年7月15日（水）19:00〜" />
    <label>場所</label>
    <input type="text" id="inp-place" placeholder="例: CyberAgent渋谷オフィス" />
    <label>スローガン・補足テキスト</label>
    <textarea id="inp-slogan" placeholder="例: CREATE THE FUTURE"></textarea>
    <label>主催・ロゴテキスト</label>
    <input type="text" id="inp-organizer" placeholder="例: デザファク × AI推進チーム" />

    <div class="section-title">🖼️ 画像アップロード</div>
    <div class="img-upload-area" id="upload-area" onclick="document.getElementById('img-input').click()">
      <div class="icon">📁</div>
      <div id="upload-label">クリックまたはドロップで画像を追加</div>
      <img id="img-thumb" class="img-preview-thumb" />
    </div>
    <div class="img-clear-btn" id="img-clear-btn" onclick="clearImage()">✕ 画像を削除</div>
    <input type="file" id="img-input" accept="image/*" style="display:none" onchange="handleImageUpload(event)" />

    <label style="margin-top:16px">画像レイアウト</label>
    <div class="img-layout-row">
      <div class="img-layout-btn active" data-layout="right" onclick="selectImgLayout(this)">◧ 右に配置</div>
      <div class="img-layout-btn" data-layout="bg" onclick="selectImgLayout(this)">⬛ 背景に敷く</div>
    </div>

    <label style="margin-top:14px">画像サイズ <span id="img-size-val" style="color:#ffd93d;font-weight:700;">80%</span></label>
    <input type="range" id="img-size" min="40" max="100" value="80" step="5"
      style="width:100%;accent-color:#ff6b9d;cursor:pointer;"
      oninput="document.getElementById('img-size-val').textContent=this.value+'%'" />

    <label style="margin-top:10px">上下位置 <span id="img-pos-val" style="color:#ffd93d;font-weight:700;">中央</span></label>
    <input type="range" id="img-pos" min="0" max="100" value="50" step="5"
      style="width:100%;accent-color:#ff6b9d;cursor:pointer;"
      oninput="updatePosLabel(this.value)" />

    <div class="section-title">🎨 デザイン設定</div>
    <label>フォント</label>
    <div id="font-picker" style="display:flex;flex-direction:column;gap:6px;margin-top:4px;"></div>

    <label style="margin-top:16px">カラーテーマ</label>
    <div class="color-row" id="color-picker">
      <div class="color-chip active" data-theme="pop"    style="background:linear-gradient(135deg,#ff6b9d,#ffd93d)" title="ポップ"></div>
      <div class="color-chip"        data-theme="ocean"  style="background:linear-gradient(135deg,#0099ff,#00e5c5)" title="オーシャン"></div>
      <div class="color-chip"        data-theme="sunset" style="background:linear-gradient(135deg,#ff4e00,#ffcc00)" title="サンセット"></div>
      <div class="color-chip"        data-theme="night"  style="background:linear-gradient(135deg,#7b2fff,#ff6bff)" title="ナイト"></div>
      <div class="color-chip"        data-theme="forest" style="background:linear-gradient(135deg,#00c853,#aaff00)" title="フォレスト"></div>
      <div class="color-chip"        data-theme="dark"   style="background:linear-gradient(135deg,#1a1a1a,#3a3a3a);border:1px solid #555;" title="ダーク"></div>
      <div class="color-chip"        data-theme="navy"   style="background:linear-gradient(135deg,#f0f4ff,#ffffff);border:1px solid #ccd;" title="ネイビー＆ホワイト"></div>
    </div>
    <label style="margin-top:16px">テキストレイアウト</label>
    <select id="inp-layout">
      <option value="left">左寄せ（標準）</option>
      <option value="center">中央揃え</option>
    </select>
    <button class="generate-btn" onclick="generatePoster()">✨ ポスターを生成する</button>
  </div>

  <div class="right-panel">
    <div class="preview-label">プレビュー（1200 × 630px）</div>
    <div class="poster-wrapper" id="poster-wrapper">
      <div id="poster-canvas">
        <div class="placeholder-msg" id="placeholder">
          <span class="icon">🖼️</span>
          <span>左のフォームに情報を入力して<br>「ポスターを生成する」を押してください</span>
        </div>
      </div>
    </div>
    <div class="bottom-actions">
      <button class="download-btn"       id="dl-btn"       disabled onclick="downloadPoster()">⬇️ PNG</button>
      <button class="download-btn-video" id="dl-video-btn" disabled onclick="downloadVideo()">🎬 WebM</button>

    </div>
  </div>
</div>



<script>
var FONTS = [
  { id:'mplus',    label:'M PLUS 1p',      google:'M+PLUS+1p:wght@400;700;900',       css:'"M PLUS 1p", sans-serif' },
  { id:'shippori', label:'Shippori Mincho', google:'Shippori+Mincho:wght@400;700;800', css:'"Shippori Mincho", serif' },
  { id:'reggae',   label:'Reggae One',      google:'Reggae+One',                       css:'"Reggae One", cursive' },
];

var currentFont = FONTS[0];

// Render font picker
(function() {
  var picker = document.getElementById('font-picker');
  FONTS.forEach(function(f, i) {
    // Inject font link
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://fonts.googleapis.com/css2?family=' + f.google + '&display=swap';
    document.head.appendChild(link);

    var btn = document.createElement('div');
    btn.dataset.id = f.id;
    btn.style.cssText = 'padding:8px 12px;border-radius:8px;cursor:pointer;border:1px solid rgba(0,0,0,0.10);transition:all 0.2s;display:flex;align-items:center;justify-content:space-between;background:#f8f9fc;';
    btn.innerHTML = '<span style="font-family:' + f.css + ';font-size:15px;font-weight:700;color:#1a1a2e;">' + f.label + '</span>'
      + '<span style="font-family:' + f.css + ';font-size:12px;color:#aaa;">あAa</span>';
    if (i === 0) { btn.style.borderColor = '#ff6b9d'; btn.style.background = 'rgba(255,107,157,0.08)'; }
    btn.addEventListener('click', function() {
      document.querySelectorAll('#font-picker > div').forEach(function(b){
        b.style.borderColor = 'rgba(0,0,0,0.10)'; b.style.background = '#f8f9fc';
      });
      btn.style.borderColor = '#ff6b9d'; btn.style.background = 'rgba(255,107,157,0.08)';
      currentFont = f;
    });
    picker.appendChild(btn);
  });
})();

var THEMES = {
  pop:    { accent:'#ffd93d', dark:'#0f0f1a' },
  ocean:  { accent:'#00e5c5', dark:'#001a33' },
  sunset: { accent:'#ffcc00', dark:'#1a0a00' },
  night:  { accent:'#ff6bff', dark:'#0d001a' },
  forest: { accent:'#aaff00', dark:'#001a0a' },
  dark:   { accent:'#e0e0e0', dark:'#111111' },
  navy:   { accent:'#1a1a2e', dark:'#1a1a2e' }
};
var GRADIENTS = {
  pop:    ['#ff6b9d','#ffd93d','#6bcbff'],
  ocean:  ['#0099ff','#00c8e5','#00e5c5'],
  sunset: ['#ff4e00','#ff9900','#ffcc00'],
  night:  ['#7b2fff','#cc44ff','#ff6bff'],
  forest: ['#00c853','#66dd00','#aaff00'],
  dark:   ['#1a1a1a','#2d2d2d','#111111'],
  navy:   ['#f8f9ff','#e8edf8','#ffffff']
};

var currentTheme = 'pop';
var currentPosterData = null;
var uploadedImageDataURL = null;
var currentImgLayout = 'right';

/* ===== IMAGE UPLOAD ===== */
var uploadArea = document.getElementById('upload-area');
uploadArea.addEventListener('dragover', function(e){ e.preventDefault(); uploadArea.style.borderColor='#ff6b9d'; });
uploadArea.addEventListener('dragleave', function(){ uploadArea.style.borderColor=''; });
uploadArea.addEventListener('drop', function(e){
  e.preventDefault(); uploadArea.style.borderColor='';
  var file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImageFile(file);
});

function handleImageUpload(e) {
  var file = e.target.files[0];
  if (file) loadImageFile(file);
}

function loadImageFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    uploadedImageDataURL = e.target.result;
    var thumb = document.getElementById('img-thumb');
    thumb.src = uploadedImageDataURL;
    thumb.classList.add('visible');
    document.getElementById('upload-label').textContent = file.name;
    document.getElementById('upload-area').classList.add('has-image');
    document.getElementById('img-clear-btn').classList.add('visible');
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  uploadedImageDataURL = null;
  document.getElementById('img-input').value = '';
  var thumb = document.getElementById('img-thumb');
  thumb.src = ''; thumb.classList.remove('visible');
  document.getElementById('upload-label').textContent = 'クリックまたはドロップで画像を追加';
  document.getElementById('upload-area').classList.remove('has-image');
  document.getElementById('img-clear-btn').classList.remove('visible');
}

function updatePosLabel(v) {
  var labels = {0:'上寄せ', 25:'やや上', 50:'中央', 75:'やや下', 100:'下寄せ'};
  var closest = Object.keys(labels).reduce(function(a,b){ return Math.abs(b-v)<Math.abs(a-v)?b:a; });
  document.getElementById('img-pos-val').textContent = labels[closest] || v + '%';
}

function selectImgLayout(el) {
  document.querySelectorAll('.img-layout-btn').forEach(function(b){ b.classList.remove('active'); });
  el.classList.add('active');
  currentImgLayout = el.dataset.layout;
}

/* ===== COLOR PICKER ===== */
document.getElementById('color-picker').addEventListener('click', function(e) {
  var chip = e.target.closest('.color-chip');
  if (!chip) return;
  document.querySelectorAll('.color-chip').forEach(function(c){ c.classList.remove('active'); });
  chip.classList.add('active');
  currentTheme = chip.dataset.theme;
});

/* ===== SCALE ===== */
function scaleCanvas() {
  var wrapper = document.getElementById('poster-wrapper');
  var canvas  = document.getElementById('poster-canvas');
  var scale = wrapper.clientWidth / 1200;
  canvas.style.transform = 'scale(' + scale + ')';
  canvas.style.width  = '1200px';
  canvas.style.height = '630px';
  wrapper.style.height = (630 * scale) + 'px';
}
window.addEventListener('resize', scaleCanvas);

/* ===== GENERATE ===== */
function generatePoster() {
  var title     = document.getElementById('inp-title').value.trim();
  if (!title) { alert('イベント名を入力してください'); return; }
  var subtitle  = document.getElementById('inp-subtitle').value.trim();
  var date      = document.getElementById('inp-date').value.trim();
  var place     = document.getElementById('inp-place').value.trim();
  var slogan    = document.getElementById('inp-slogan').value.trim();
  var organizer = document.getElementById('inp-organizer').value.trim();
  var layout    = document.getElementById('inp-layout').value;
  var theme     = THEMES[currentTheme];
  var grads     = GRADIENTS[currentTheme];
  var titleSize = title.length > 10 ? 54 : 68;
  var hasImage  = !!uploadedImageDataURL;
  var imgLayout = hasImage ? currentImgLayout : 'none';
  var imgSize   = hasImage ? parseInt(document.getElementById('img-size').value) : 100;
  var imgPos    = hasImage ? parseInt(document.getElementById('img-pos').value) : 50;
  // ダーク系は白テキスト、ネイビー白系は紺テキスト
  var textColor = currentTheme === 'dark' ? '#ffffff' : currentTheme === 'navy' ? '#1a1a2e' : theme.dark;
  var accentColor = currentTheme === 'dark' ? '#ffd93d' : currentTheme === 'navy' ? '#ffffff' : theme.accent;

  // Text column width depends on image layout
  var textColWidth = (hasImage && imgLayout === 'right') ? '55%' : '100%';
  var contentAlign = layout === 'center' ? 'align-items:center;text-align:center;' : '';

  var metaHTML = '';
  if (date)  metaHTML += '<div class="meta-pill"><div class="meta-label">DATE</div><div class="meta-val" style="color:' + textColor + ';">' + date  + '</div></div>';
  if (place) metaHTML += '<div class="meta-pill"><div class="meta-label">PLACE</div><div class="meta-val" style="color:' + textColor + ';">' + place + '</div></div>';

  // スローガン：右に画像がある場合はテキストエリア内の下部に横書き、それ以外は右端縦書き
  var sloganHTML = '';
  if (slogan) {
    if (hasImage && imgLayout === 'right') {
      // テキストカラム内の下部に横書きで配置（画像と被らない）
      sloganHTML = ''; // テキストカラム内でsubHTMLの後に挿入するので後で処理
    } else {
      // 右端縦書き（従来通り）
      sloganHTML = '<div style="position:absolute;right:52px;top:50%;transform:translateY(-50%) rotate(90deg);transform-origin:center;font-size:13px;font-weight:700;letter-spacing:0.22em;color:rgba(128,128,128,0.4);white-space:nowrap;">' + slogan + '</div>';
    }
  }
  var sloganInlineHTML = (slogan && hasImage && imgLayout === 'right')
    ? '<div class="anim-meta" style="margin-top:16px;font-size:12px;font-weight:700;letter-spacing:0.2em;color:' + textColor + ';opacity:0.4;text-transform:uppercase;">' + slogan + '</div>'
    : '';

/* ========== PNG DOWNLOAD（Canvas直接描画） ========== */
async function downloadPoster() {
  if (!currentPosterData) return;
  var btn = document.getElementById('dl-btn');
  btn.disabled = true; btn.textContent = '⏳ 生成中...';
  try {
    var d = currentPosterData;
    var theme = THEMES[d.theme];
    var grads = GRADIENTS[d.theme];
    var titleSize = d.title.length > 10 ? 54 : 68;
    var hasImage = !!d.imgDataURL;
    var imgLayout = d.imgLayout || 'none';
    var imgSize = d.imgSize !== undefined ? d.imgSize : 100;
    var imgPos  = d.imgPos  !== undefined ? d.imgPos  : 50;
    var darkColor = (hasImage && imgLayout === 'bg') ? '#ffffff'
                  : d.theme === 'dark'  ? '#ffffff'
                  : d.theme === 'navy'  ? '#1a1a2e'
                  : theme.dark;
    var accentColor = d.theme === 'dark' ? '#ffd93d' : d.theme === 'navy' ? '#1a1a2e' : theme.accent;

    var W = 1200, H = 630;
    var canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    var ctx = canvas.getContext('2d');

    // 画像プリロード
    var imgEl = null;
    if (hasImage) {
      imgEl = new Image();
      await new Promise(function(res){ imgEl.onload = res; imgEl.src = d.imgDataURL; });
    }

    // --- 背景 ---
    if (hasImage && imgLayout === 'bg') {
      ctx.save(); ctx.beginPath(); ctx.rect(0,0,W,H); ctx.clip();
      drawImageCover(ctx, imgEl, 0, 0, W, H, imgSize, imgPos);
      ctx.restore();
      var ov = ctx.createLinearGradient(0,0,W,H);
      ov.addColorStop(0, grads[0]+'cc'); ov.addColorStop(1, grads[2]+'99');
      ctx.fillStyle = ov; ctx.fillRect(0,0,W,H);
    } else {
      // グラデーション背景
      var p = 0.5;
      var grad = ctx.createLinearGradient(0, 0, W*(0.4+p*0.6), H);
      grad.addColorStop(0, grads[0]); grad.addColorStop(0.5, grads[1]); grad.addColorStop(1, grads[2]);
      ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

      // デコ円
      ctx.save();
      ctx.globalAlpha=0.18; ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(1150, 110, 280, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.10; ctx.fillStyle='#000';
      ctx.beginPath(); ctx.arc(1080, 545, 200, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.30; ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(960, 100, 60, 0, Math.PI*2); ctx.fill();
      ctx.restore();

      // 右側画像パネル
      if (hasImage && imgLayout === 'right') {
        ctx.save(); ctx.beginPath(); ctx.rect(576,0,624,H); ctx.clip();
        drawImageCover(ctx, imgEl, 576, 0, 624, H, imgSize, imgPos);
        var fade = ctx.createLinearGradient(576,0,820,0);
        fade.addColorStop(0,'rgba(0,0,0,0.18)'); fade.addColorStop(1,'transparent');
        ctx.fillStyle=fade; ctx.fillRect(576,0,624,H);
        ctx.restore();
      }
    }

    // --- テキスト共通設定 ---
    var textAlign = d.layout === 'center' ? 'center' : 'left';
    var textX = d.layout === 'center' ? (hasImage && imgLayout==='right' ? 330 : 600) : 80;
    var textColW = (hasImage && imgLayout==='right') ? 576 : W;

    // 主催
    if (d.organizer) {
      ctx.textAlign='right'; ctx.font='700 12px sans-serif';
      ctx.fillStyle='rgba(0,0,0,0.40)';
      ctx.fillText(d.organizer, 1120, 48);
    }
    // スローガン（縦書き風、右端）
    if (d.slogan && !(hasImage && imgLayout==='right')) {
      ctx.save(); ctx.translate(1156,315); ctx.rotate(Math.PI/2);
      ctx.font='700 12px sans-serif'; ctx.fillStyle='rgba(128,128,128,0.4)'; ctx.textAlign='center';
      ctx.fillText(d.slogan.toUpperCase(),0,0); ctx.restore();
    }

    // EVENTバッジ
    ctx.fillStyle = darkColor;
    rrect(ctx, textX-(textAlign==='center'?40:0), 170, 80, 28, 14); ctx.fill();
    ctx.fillStyle = accentColor; ctx.font='700 12px sans-serif'; ctx.textAlign='left';
    ctx.fillText('EVENT', textX-(textAlign==='center'?40:0)+16, 189);

    // タイトル（\n で手動改行 + 長い行は自動折り返し）
    ctx.fillStyle = darkColor; ctx.textAlign = textAlign;
    ctx.font = '900 '+titleSize+'px sans-serif';
    var maxW = (hasImage && imgLayout==='right') ? 490 : 1040;
    var manualLines = d.title.split('\n');
    var lines = [];
    manualLines.forEach(function(ml) { wrapText(ctx, ml, maxW).forEach(function(l){ lines.push(l); }); });
    var ty = 240 + titleSize * 0.75;
    lines.forEach(function(line) {
      ctx.fillText(line, textX, ty); ty += titleSize * 1.1;
    });

    // サブタイトル
    if (d.subtitle) {
      var sy = ty + 10;
      ctx.globalAlpha=0.72; ctx.font='700 20px sans-serif'; ctx.textAlign=textAlign;
      ctx.fillStyle=darkColor; ctx.fillText(d.subtitle, textX, sy); ctx.globalAlpha=1;
      ty = sy + 38;
    } else { ty += 10; }

    // スローガン（右に画像がある場合は左下に横書き）
    if (d.slogan && hasImage && imgLayout==='right') {
      ctx.globalAlpha=0.4; ctx.font='700 12px sans-serif'; ctx.textAlign=textAlign;
      ctx.fillStyle=darkColor; ctx.fillText(d.slogan.toUpperCase(), textX, ty+10); ctx.globalAlpha=1;
      ty += 28;
    }

    // DATEとPLACEのピル
    var pills = [];
    if (d.date)  pills.push({label:'DATE',  val:d.date});
    if (d.place) pills.push({label:'PLACE', val:d.place});
    // 幅をそれぞれの実際のフォントサイズで計測
    function pillWidth(pill) {
      ctx.font='700 10px sans-serif';
      var lw = ctx.measureText(pill.label).width;
      ctx.font='900 15px sans-serif';
      var vw = ctx.measureText(pill.val).width;
      return Math.max(lw, vw) + 40; // 左右パディング各20px
    }
    var mx = textAlign==='center' ? null : 80;
    if (textAlign==='center') {
      var totalW = 0;
      pills.forEach(function(p){ totalW += pillWidth(p) + 16; });
      mx = (textColW - totalW) / 2;
    }
    pills.forEach(function(pill) {
      var vw = pillWidth(pill);
      ctx.fillStyle='rgba(255,255,255,0.5)'; rrect(ctx,mx,ty,vw,54,12); ctx.fill();
      ctx.font='700 10px sans-serif'; ctx.fillStyle='#555'; ctx.textAlign='left';
      ctx.fillText(pill.label, mx+18, ty+18);
      ctx.font='900 15px sans-serif'; ctx.fillStyle=darkColor;
      ctx.fillText(pill.val, mx+18, ty+38);
      mx += vw+16;
    });

    // ダウンロード
    var link = document.createElement('a');
    link.download = 'event-poster.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) { alert('ダウンロードに失敗しました: ' + e.message); }
  btn.disabled = false; btn.textContent = '⬇️ PNG';
}

// テキスト折り返しヘルパー
function wrapText(ctx, text, maxWidth) {
  var words = text.split('');
  var lines = [], line = '';
  for (var i=0; i<words.length; i++) {
    var test = line + words[i];
    if (ctx.measureText(test).width > maxWidth && line.length > 0) {
      lines.push(line); line = words[i];
    } else { line = test; }
  }
  if (line) lines.push(line);
  return lines;
}

// 画像をプレビューと同じロジックでCanvasに描画してbase64で返す
function cropImageToCanvas(dataURL, w, h, sizePercent, posPercent) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var c = document.createElement('canvas');
      c.width = w; c.height = h;
      var ctx = c.getContext('2d');
      var iw = img.naturalWidth, ih = img.naturalHeight;
      if (sizePercent >= 100) {
        // coverモード: パネル全体を埋める
        var scale = Math.max(w / iw, h / ih);
        var dw = iw * scale, dh = ih * scale;
        var dx = (w - dw) * 0.5;
        var dy = (h - dh) * (posPercent / 100);
        ctx.drawImage(img, dx, dy, dw, dh);
      } else {
        // containモード: 見切れなし、指定サイズに縮小
        var scale = Math.min(w / iw, h / ih) * (sizePercent / 100);
        var dw = iw * scale, dh = ih * scale;
        var dx = (w - dw) * 0.5;
        var dy = (h - dh) * (posPercent / 100);
        ctx.drawImage(img, dx, dy, dw, dh);
      }
      resolve(c.toDataURL('image/png'));
    };
    img.src = dataURL;
  });
}

/* ========== PPTX DOWNLOAD (removed) ========== */
async function downloadPptx_disabled() {

  var btn = document.getElementById('dl-pptx-btn');
  btn.disabled = true; btn.textContent = '⏳ 生成中...';
  try {
    var d = currentPosterData;

    var tColor = d.theme === 'dark' ? 'ffffff' : d.theme === 'navy' ? '1a1a2e' : theme.dark.replace('#','');
    var aColor = d.theme === 'dark' ? 'ffd93d' : d.theme === 'navy' ? '1a1a2e' : theme.accent.replace('#','');
    var bg1 = grads[0].replace('#','');
    var bg2 = grads[2].replace('#','');

    var pres = new PptxGenJS();
    pres.layout = 'LAYOUT_WIDE'; // 13.3" x 7.5"
    pres.title = d.title;

    var slide = pres.addSlide();

    // 背景：グラデーション近似（左右2分割で表現）
    slide.addShape(pres.ShapeType.rect, { x:0, y:0, w:13.3, h:7.5, fill:{ color: bg1 }, line:{ color: bg1 } });
    slide.addShape(pres.ShapeType.rect, { x:6.65, y:0, w:6.65, h:7.5, fill:{ color: bg2, transparency:30 }, line:{ color: bg2 } });

    // デコ円（右上）
    slide.addShape(pres.ShapeType.ellipse, { x:9.5, y:-1.2, w:5, h:5, fill:{ color:'ffffff', transparency:80 }, line:{ color:'ffffff', transparency:80 } });
    slide.addShape(pres.ShapeType.ellipse, { x:10, y:5, w:3, h:3,   fill:{ color:'000000', transparency:88 }, line:{ color:'000000', transparency:88 } });

    // アップロード画像（事前にcanvasでクロップしてbase64化）
    if (d.imgDataURL && d.imgLayout !== 'none') {
      var pptW = d.imgLayout === 'right' ? 576 : 1200;
      var croppedURL = await cropImageToCanvas(d.imgDataURL, pptW, 630, d.imgSize || 100, d.imgPos !== undefined ? d.imgPos : 50);
      // クロップ済みなのでsizingは指定しない（比率そのまま）
      if (d.imgLayout === 'right') {
        slide.addImage({ data: croppedURL, x:6.8, y:0, w:6.5, h:7.5 });
        slide.addShape(pres.ShapeType.rect, { x:6.8, y:0, w:1.5, h:7.5, fill:{ color: bg1, transparency:40 }, line:{ color: bg1 } });
      } else if (d.imgLayout === 'bg') {
        slide.addImage({ data: croppedURL, x:0, y:0, w:13.3, h:7.5 });
        slide.addShape(pres.ShapeType.rect, { x:0, y:0, w:13.3, h:7.5, fill:{ color: bg1, transparency:40 }, line:{ color: bg1 } });
      }
    }

    var textW = (d.imgDataURL && d.imgLayout === 'right') ? 6.0 : 10;

    // EVENTバッジ
    slide.addShape(pres.ShapeType.roundRect, { x:0.8, y:1.2, w:1.4, h:0.36, fill:{ color: tColor }, line:{ color: tColor }, rectRadius:0.18 });
    slide.addText('EVENT', { x:0.8, y:1.2, w:1.4, h:0.36, fontSize:11, bold:true, color: aColor, fontFace: fontFace, align:'center', valign:'middle', margin:0 });

    // タイトル
    slide.addText(d.title, { x:0.8, y:1.7, w:textW, h:2.2, fontSize: titleSize, bold:true, color: tColor, fontFace: fontFace, valign:'top', shrinkText:true });

    // サブタイトル
    var nextY = d.title.length > 10 ? 3.8 : 3.6;
    if (d.subtitle) {
      slide.addText(d.subtitle, { x:0.8, y: nextY, w:textW, h:0.6, fontSize:18, bold:true, color: tColor, fontFace: fontFace, transparency:30 });
      nextY += 0.75;
    }

    // 日時・場所メタ情報
    if (d.date || d.place) {
      var metaX = 0.8;
      if (d.date) {
        slide.addShape(pres.ShapeType.roundRect, { x:metaX, y:nextY, w:3.2, h:0.72, fill:{ color:'ffffff', transparency:45 }, line:{ color:'ffffff', transparency:45 }, rectRadius:0.1 });
        slide.addText([{ text:'DATE\n', options:{ fontSize:9, bold:true, color:'555555', breakLine:true } }, { text:d.date, options:{ fontSize:13, bold:true, color: tColor } }], { x:metaX+0.15, y:nextY+0.06, w:2.9, h:0.6, fontFace: fontFace, valign:'top' });
        metaX += 3.4;
      }
      if (d.place) {
        slide.addShape(pres.ShapeType.roundRect, { x:metaX, y:nextY, w:3.2, h:0.72, fill:{ color:'ffffff', transparency:45 }, line:{ color:'ffffff', transparency:45 }, rectRadius:0.1 });
        slide.addText([{ text:'PLACE\n', options:{ fontSize:9, bold:true, color:'555555', breakLine:true } }, { text:d.place, options:{ fontSize:13, bold:true, color: tColor } }], { x:metaX+0.15, y:nextY+0.06, w:2.9, h:0.6, fontFace: fontFace, valign:'top' });
      }
    }

    // スローガン（右端縦書き風）
    if (d.slogan && !(d.imgDataURL && d.imgLayout === 'right')) {
      slide.addText(d.slogan.toUpperCase(), { x:12.0, y:1.5, w:1, h:5, fontSize:10, bold:true, color: tColor, fontFace: fontFace, transparency:70, rotate:90, align:'center' });
    }

    // 主催
    if (d.organizer) {
      slide.addText(d.organizer, { x:0.8, y:0.3, w:8, h:0.4, fontSize:11, bold:true, color: tColor, fontFace: fontFace, transparency:55 });
    }

    await pres.writeFile({ fileName: 'event-poster.pptx' });

  } catch(e) {
    console.error(e);
    alert('PPTXの生成に失敗しました: ' + e.message);
  }
  btn.disabled = false; btn.textContent = '📊 PPTX';
}

/* ========== VIDEO DOWNLOAD ========== */
async function downloadVideo() {
  if (!currentPosterData) return;
  var btn = document.getElementById('dl-video-btn');
  btn.disabled = true; btn.textContent = '⏳ 録画中（5秒）...';
  try {
    var d = currentPosterData;
    var theme = THEMES[d.theme];
    var grads = GRADIENTS[d.theme];
    var titleSize = d.title.length > 10 ? 54 : 68;
    var hasImage = !!d.imgDataURL;
    var imgLayout = d.imgLayout || 'none';
    var darkColor = (hasImage && imgLayout === 'bg') ? '#ffffff' : theme.dark;

    var offscreen = document.createElement('canvas');
    offscreen.width = 1200; offscreen.height = 630;
    var ctx = offscreen.getContext('2d');

    // Pre-load image if any
    var imgEl = null;
    if (hasImage) {
      imgEl = new Image();
      await new Promise(function(res){ imgEl.onload = res; imgEl.src = d.imgDataURL; });
    }

    var stream = offscreen.captureStream(30);
    var recorder = new MediaRecorder(stream, { mimeType:'video/webm;codecs=vp9' });
    var chunks = [];
    recorder.ondataavailable = function(e){ chunks.push(e.data); };

    var startTime = performance.now();
    var DURATION = 5000;
    recorder.start();

    function drawFrame(now) {
      var t = (now - startTime) / 1000;
      var elapsed = now - startTime;
      ctx.clearRect(0, 0, 1200, 630);

      if (hasImage && imgLayout === 'bg') {
        // 背景画像を全面に描画
        ctx.save();
        ctx.beginPath(); ctx.rect(0, 0, 1200, 630); ctx.clip();
        drawImageCover(ctx, imgEl, 0, 0, 1200, 630, d.imgSize || 100, d.imgPos !== undefined ? d.imgPos : 50);
        ctx.restore();
        // グラデーションオーバーレイ
        var overlay = ctx.createLinearGradient(0, 0, 1200, 630);
        overlay.addColorStop(0, grads[0] + 'cc');
        overlay.addColorStop(1, grads[2] + '99');
        ctx.fillStyle = overlay;
        ctx.fillRect(0, 0, 1200, 630);
      } else {
        // Animated gradient bg
        var p = (Math.sin(t * 0.4) * 0.5 + 0.5);
        var grad = ctx.createLinearGradient(0, 0, 1200 * (0.4 + p * 0.6), 630);
        grad.addColorStop(0, grads[0]); grad.addColorStop(0.5, grads[1]); grad.addColorStop(1, grads[2]);
        ctx.fillStyle = grad; ctx.fillRect(0, 0, 1200, 630);

        // Right image panel
        if (hasImage && imgLayout === 'right') {
          ctx.save(); ctx.beginPath(); ctx.rect(576, 0, 624, 630); ctx.clip();
          drawImageCover(ctx, imgEl, 576, 0, 624, 630, d.imgSize || 100, d.imgPos !== undefined ? d.imgPos : 50);
          var fadeGrad = ctx.createLinearGradient(576, 0, 820, 0);
          fadeGrad.addColorStop(0, 'rgba(0,0,0,0.18)'); fadeGrad.addColorStop(1, 'transparent');
          ctx.fillStyle = fadeGrad; ctx.fillRect(576, 0, 624, 630);
          ctx.restore();
        }

        // Floating circles
        var ax = Math.sin(t*0.7)*18, ay = Math.cos(t*0.5)*22;
        var bx = Math.cos(t*0.6)*20, by = Math.sin(t*0.4)*18;
        var cx2 = Math.sin(t*1.1)*10, cy2 = Math.cos(t*0.9)*16;
        ctx.save();
        ctx.globalAlpha=0.18; ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(1150+ax, 110+ay, 280, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha=0.10; ctx.fillStyle='#000';
        ctx.beginPath(); ctx.arc(1080+bx, 545+by, 200, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha=0.30; ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(960+cx2, 100+cy2, 60, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }

      // Organizer & Slogan text
      if (d.organizer) {
        ctx.textAlign='right'; ctx.font='700 12px sans-serif'; ctx.fillStyle='rgba(0,0,0,0.40)';
        ctx.fillText(d.organizer, 1120, 48);
      }
      if (d.slogan) {
        ctx.save(); ctx.translate(1156,315); ctx.rotate(Math.PI/2);
        ctx.font='700 12px sans-serif'; ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.textAlign='center';
        ctx.fillText(d.slogan.toUpperCase(), 0, 0); ctx.restore();
      }

      function fade(start, dur) { return Math.min(1, Math.max(0, (t - start) / dur)); }

      var ba = fade(0.1, 0.5);
      if (ba > 0) {
        ctx.globalAlpha=ba; ctx.fillStyle=darkColor;
        rrect(ctx, 80, 170, 80, 28, 14); ctx.fill();
        ctx.fillStyle=theme.accent; ctx.font='700 12px sans-serif'; ctx.textAlign='left';
        ctx.fillText('EVENT', 96, 189); ctx.globalAlpha=1;
      }
      var ta = fade(0.3, 0.6), to = (1-ta)*24;
      if (ta > 0) {
        ctx.globalAlpha=ta; ctx.fillStyle=darkColor;
        ctx.font='900 ' + titleSize + 'px sans-serif'; ctx.textAlign='left';
        var titleLines2 = d.title.split('\n');
        var tly = 240+titleSize*0.75+to;
        titleLines2.forEach(function(line){ ctx.fillText(line, 80, tly); tly += titleSize*1.1; });
        ctx.globalAlpha=1;
      }
      if (d.subtitle) {
        var sa=fade(0.55,0.6), so=(1-sa)*24;
        if (sa>0){ ctx.globalAlpha=sa*0.72; ctx.fillStyle=darkColor; ctx.font='700 20px sans-serif'; ctx.fillText(d.subtitle,80,345+so); ctx.globalAlpha=1; }
      }
      var ma=fade(0.8,0.6), mo=(1-ma)*24;
      if (ma>0) {
        var metaY=d.subtitle?385:355;
        var items=[];
        if (d.date)  items.push({label:'DATE',val:d.date});
        if (d.place) items.push({label:'PLACE',val:d.place});
        var mx2=80; ctx.globalAlpha=ma;
        for (var i=0;i<items.length;i++) {
          ctx.font='700 10px sans-serif';
          var lw2=ctx.measureText(items[i].label).width;
          ctx.font='900 15px sans-serif';
          var vw2=ctx.measureText(items[i].val).width;
          var vw=Math.max(lw2,vw2)+40;
          ctx.fillStyle='rgba(255,255,255,0.5)'; rrect(ctx,mx2,metaY+mo,vw,54,12); ctx.fill();
          ctx.font='700 10px sans-serif'; ctx.fillStyle='#555'; ctx.fillText(items[i].label,mx2+18,metaY+18+mo);
          ctx.font='900 15px sans-serif'; ctx.fillStyle=darkColor; ctx.fillText(items[i].val,mx2+18,metaY+38+mo);
          mx2+=vw+16;
        }
        ctx.globalAlpha=1;
      }

      if (elapsed < DURATION) { requestAnimationFrame(drawFrame); }
      else { recorder.stop(); }
    }
    requestAnimationFrame(drawFrame);

    await new Promise(function(res){ recorder.onstop=res; });
    var blob = new Blob(chunks,{type:'video/webm'});
    var url = URL.createObjectURL(blob);
    var link = document.createElement('a');
    link.download='event-banner.webm'; link.href=url; link.click();
    URL.revokeObjectURL(url);
  } catch(e) { alert('動画生成に失敗しました: ' + e.message); }
  btn.disabled=false; btn.textContent='🎬 動画をダウンロード（WebM）';
}

function drawImageCover(ctx, img, dx, dy, dw, dh, sizePercent, posPercent) {
  var iw = img.naturalWidth, ih = img.naturalHeight;
  var scale, drawW, drawH, offsetX, offsetY;
  if (sizePercent >= 100) {
    // coverモード: パネル全体を埋める
    scale = Math.max(dw / iw, dh / ih);
    drawW = iw * scale; drawH = ih * scale;
    offsetX = (dw - drawW) * 0.5;
    offsetY = (dh - drawH) * (posPercent / 100);
  } else {
    // containモード: 見切れなし、縮小
    scale = Math.min(dw / iw, dh / ih) * (sizePercent / 100);
    drawW = iw * scale; drawH = ih * scale;
    offsetX = (dw - drawW) * 0.5;
    offsetY = (dh - drawH) * (posPercent / 100);
  }
  ctx.drawImage(img, dx + offsetX, dy + offsetY, drawW, drawH);
}

function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}
</script>
